<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Wire — your personal news desk</title>
<meta name="description" content="Your personal news desk — researched three times a day across the desks you choose, in British English, with a daily podcast. No ads, no comment columns." />
<meta property="og:title" content="The Wire" />
<meta property="og:description" content="A personal news desk, researched three times a day, with its own daily podcast." />
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14161B" />
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F4F1EA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="The Wire" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

:root{
  --ink:#14161B; --panel:#1B1E26; --panel2:#222732; --line:#2E333F;
  --text:#ECE7DB; --muted:#969BA8; --faint:#6A6F7C; --body:#cfcabd;
  --amber:#F2A93B; --red:#E23B4C; --up:#46C06A; --down:#F0563A;
  --violet:#9B8CFF; --sky:#5BB8E8; --green:#5FBE7E; --teal:#2FC8C8;
}
/* Light mode: override the palette; everything else uses these vars. */
body[data-theme="light"]{
  --ink:#F4F1EA; --panel:#FFFFFF; --panel2:#F1EDE5; --line:#DFDACE;
  --text:#1A1D24; --muted:#5C626C; --faint:#9197A1; --body:#3A3F49;
  --amber:#B5730C; --red:#CB2F40; --up:#2E9E54; --down:#D8482C;
  --violet:#6F5BE0; --sky:#2E8FC4; --green:#3A9E5E; --teal:#1FA3A3;
}
body[data-theme="light"] .sw.like{ color:#1D6B38; background:rgba(46,158,84,.14); }
body[data-theme="light"] .sw.nope{ color:#A03322; background:rgba(216,72,44,.12); }
*{ box-sizing:border-box; }
body{
  margin:0; background:radial-gradient(120% 80% at 50% -10%, rgba(242,169,59,.10), transparent 55%), var(--ink);
  color:var(--text); font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; padding-bottom:64px;
}
a{ color:inherit; text-decoration:none; }

.mast{ display:flex; justify-content:space-between; align-items:flex-end; gap:16px; padding:22px 20px 14px; max-width:760px; margin:0 auto; }
.eyebrow{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--amber); margin-bottom:2px; }
.title{ font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:40px; line-height:.9; letter-spacing:-.02em; margin:0; }
.mast-r{ text-align:right; }
.date{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:8px; }
.mast-btns{ display:flex; gap:8px; justify-content:flex-end; }
.icbtn{ width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--panel); color:var(--text); cursor:pointer; font-size:15px; }
.icbtn:hover{ border-color:var(--amber); }
.refresh{ background:var(--amber); color:#1a1206; border:none; border-radius:9px; padding:0 16px; height:34px; font-weight:600; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; }
.refresh:hover{ filter:brightness(1.06); }
.refresh:disabled{ opacity:.55; cursor:default; }

.ticker{ border-top:1px solid var(--line); border-bottom:1px solid var(--line); background:rgba(0,0,0,.25); overflow:hidden; }
.ticker-track{ display:inline-flex; white-space:nowrap; padding:9px 0; animation:scroll 40s linear infinite; }
.tok{ display:inline-flex; align-items:center; gap:8px; padding:0 22px; font-family:'JetBrains Mono',monospace; font-size:12px; }
.tok-dot{ width:6px; height:6px; border-radius:50%; display:inline-block; }
@keyframes scroll{ from{transform:translateX(0)} to{transform:translateX(-50%)} }
@media (prefers-reduced-motion:reduce){ .ticker-track{ animation:none; } .ticker{ overflow-x:auto; } }

.settings{ max-width:760px; margin:10px auto 0; padding:14px 20px; background:var(--panel); border:1px solid var(--line); border-radius:14px; }
.set-row{ display:flex; gap:14px; align-items:flex-start; padding:10px 0; }
.set-row + .set-row{ border-top:1px solid var(--line); }
.set-label{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); min-width:96px; padding-top:6px; }
.set-empty{ color:var(--faint); font-size:13px; padding-top:5px; }
.set-body{ flex:1; }
.chips{ display:flex; flex-wrap:wrap; gap:7px; }
.chip{ border:1px solid var(--line); background:var(--panel2); color:var(--text); border-radius:999px; padding:5px 11px; font-size:12.5px; cursor:pointer; font-family:'Inter',sans-serif; }
.chip.off{ opacity:.42; }
.chip.muted{ color:var(--muted); }
.chip:hover{ filter:brightness(1.12); }

.dform{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
.dform input, .dform textarea{ background:var(--panel2); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:8px 10px; font:inherit; font-size:13px; width:100%; }
.dform textarea{ min-height:52px; resize:vertical; }
.dform .row{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.minibtn{ background:var(--amber); color:#1a1206; border:none; border-radius:8px; padding:8px 13px; font-weight:600; font-size:12.5px; cursor:pointer; font-family:'Inter',sans-serif; }
.linkbtn{ background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:8px; padding:8px 13px; font-size:12.5px; cursor:pointer; font-family:'Inter',sans-serif; }
.linkbtn:hover{ border-color:var(--amber); color:var(--text); }
.hint{ color:var(--faint); font-size:11.5px; margin-top:2px; }
.apple-btn{ display:inline-flex; align-items:center; gap:8px; margin-top:10px; background:#000; color:#fff; border:1px solid #000; border-radius:9px; padding:9px 16px; font-size:13px; font-weight:600; cursor:pointer; }
.apple-btn::before{ content:""; } .apple-btn:hover{ filter:brightness(1.15); }

/* onboarding desk picker */
.setup{ max-width:760px; margin:0 auto; padding:26px 20px 90px; }
.setup-head .eyebrow{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--amber); }
.setup-head h1{ font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:30px; line-height:1; letter-spacing:-.02em; margin:6px 0 8px; }
.setup-head p{ color:var(--muted); font-size:14px; margin:0 0 6px; max-width:560px; }
.setup-sec{ margin-top:22px; }
.setup-sec h2{ font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint); margin:0 0 10px; }
.pick-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
@media (max-width:520px){ .pick-grid{ grid-template-columns:1fr; } }
.pick{ text-align:left; background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--ac); border-radius:13px; padding:13px 14px; cursor:pointer; font-family:'Inter',sans-serif; color:var(--text); transition:border-color .12s, background .12s; }
.pick:hover{ border-color:var(--ac); }
.pick.on{ background:color-mix(in srgb, var(--ac) 12%, var(--panel)); border-color:var(--ac); }
.pick-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
.pick-name{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:16px; }
.pick-check{ width:22px; height:22px; border-radius:50%; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--muted); flex:0 0 auto; }
.pick.on .pick-check{ background:var(--ac); color:#15171b; border-color:var(--ac); font-weight:700; }
.pick-persona{ font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--faint); margin:2px 0 8px; letter-spacing:.04em; }
.pick-pitch{ border-top:1px dashed var(--line); padding-top:8px; }
.pick-h{ display:block; font-size:13px; line-height:1.3; color:var(--body); }
.pick-src{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--faint); }
.pick-quiet{ color:var(--faint); font-size:12px; font-style:italic; }
.pick-create{ grid-column:1 / -1; border:1px dashed var(--amber); border-left-width:1px; background:rgba(242,169,59,.06); text-align:center; display:flex; align-items:center; justify-content:center; gap:6px; font-weight:700; font-size:14px; color:var(--amber); padding:14px; }
.pick-create:hover{ background:rgba(242,169,59,.13); }
.pick-local{ border-left-width:3px; }
.create-box{ background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:14px; }
.create-box input{ width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:10px 12px; font:inherit; font-size:14px; }
.preview-card{ margin-top:12px; background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:12px 13px; }
.preview-sample{ border-top:1px dashed var(--line); margin-top:8px; padding-top:9px; }
.setup-foot{ position:fixed; left:0; right:0; bottom:0; z-index:15; display:flex; gap:12px; align-items:center; justify-content:center; padding:12px 20px calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(transparent, var(--ink) 30%); }
.setup-foot .refresh{ min-width:200px; height:40px; }

.desk{ border:1px solid var(--line); border-radius:11px; padding:10px 12px; margin-bottom:8px; background:var(--panel2); }
.desk.off{ opacity:.5; }
.desk-h{ display:flex; align-items:center; gap:8px; }
.desk-dot{ width:9px; height:9px; border-radius:50%; flex:0 0 auto; }
.desk-name{ font-weight:600; font-size:13.5px; }
.desk-persona{ font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.04em; color:var(--faint); }
.desk-toggle{ margin-left:auto; background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:7px; padding:3px 11px; font-size:11.5px; cursor:pointer; font-family:'Inter',sans-serif; }
.desk.off .desk-toggle{ color:var(--muted); }
.desk-rm{ background:transparent; border:1px solid var(--line); color:var(--faint); border-radius:7px; padding:3px 9px; font-size:11.5px; cursor:pointer; font-family:'Inter',sans-serif; }
.desk-rm:hover{ color:var(--down); border-color:var(--down); }
.desk-reorder{ display:inline-flex; flex-direction:column; gap:0; margin-right:3px; }
.desk-move{ background:transparent; border:0; color:var(--faint); cursor:pointer; font-size:10px; line-height:1.1; padding:5px 8px; }
.desk-move:hover{ color:var(--amber); }
.desk-voice{ color:var(--muted); font-size:12.5px; margin-top:6px; line-height:1.45; }
.desk-note{ width:100%; margin-top:7px; box-sizing:border-box; resize:vertical; min-height:38px; background:var(--bg); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-family:inherit; font-size:12.5px; line-height:1.4; }
.desk-note:focus{ outline:none; border-color:var(--amber); }
.desk-note::placeholder{ color:var(--faint); }
.desk-lean{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); margin-top:7px; }
.mini-sel{ background:var(--panel); border:1px solid var(--line); color:var(--text); border-radius:7px; padding:4px 8px; font-size:11.5px; font-family:'Inter',sans-serif; }

.hero{ max-width:760px; margin:0 auto; padding:26px 20px 8px; }
.hello{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:30px; margin:0 0 6px; letter-spacing:-.015em; }
.sum{ margin:0; color:var(--muted); font-size:14.5px; }

/* Sticky bar spans the full display width (edge-to-edge background + shadow);
   the pills stay centred in .filters-inner. */
.filters{ position:sticky; top:0; z-index:5; margin-top:14px; background:var(--ink); background:linear-gradient(var(--ink), color-mix(in srgb, var(--ink) 84%, transparent)); backdrop-filter:blur(6px); box-shadow:0 10px 22px -12px rgba(0,0,0,.5); }
.filters-inner{ display:flex; gap:8px; overflow-x:auto; max-width:760px; margin:0 auto; padding:12px 20px; }
.fil{ flex:0 0 auto; border:1px solid var(--line); background:var(--panel); color:var(--muted); border-radius:999px; padding:7px 13px; font-size:13px; cursor:pointer; font-family:'Inter',sans-serif; display:flex; align-items:center; gap:7px; }
.fil[draggable="true"]{ cursor:grab; }
.fil.dragging{ opacity:.45; }
.fil.drop-target{ outline:2px dashed var(--amber); outline-offset:1px; }
.podcast{ max-width:760px; margin:14px auto 0; padding:11px 15px; display:flex; align-items:center; gap:13px; border:1px solid var(--line); border-radius:14px; background:linear-gradient(180deg, color-mix(in srgb, var(--amber) 9%, var(--panel)), var(--panel)); }
.pod-play{ flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none; background:var(--amber); color:#1a1206; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.pod-play.loading{ opacity:.65; }
.pod-meta{ min-width:0; }
.pod-title{ font-weight:650; font-size:14px; letter-spacing:.01em; }
.pod-sub{ font-size:12px; color:var(--muted); margin-top:1px; }
.rtip{ max-width:760px; margin:12px auto 0; padding:10px 14px; display:flex; align-items:flex-start; gap:10px; border:1px solid var(--line); border-radius:12px; background:var(--panel); font-size:12.5px; color:var(--muted); line-height:1.5; }
.rtip b{ color:var(--text); font-weight:600; }
.rtip-x{ flex:0 0 auto; margin-left:auto; border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:14px; padding:0 2px; position:relative; }
.fil.on{ color:#15171b; font-weight:600; }
.fil .cnt{ font-family:'JetBrains Mono',monospace; font-size:11px; opacity:.8; }

.feed{ max-width:760px; margin:8px auto 0; padding:6px 20px; display:flex; flex-direction:column; gap:12px; }
.card{ position:relative; overflow:hidden; background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--ac); border-radius:13px; padding:15px 16px; touch-action:pan-y; transition:transform .25s ease, opacity .25s ease; }
.card.dragging{ transition:none; cursor:grabbing; user-select:none; }
.sw{ position:absolute; top:12px; font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:4px 9px; border-radius:7px; opacity:0; pointer-events:none; z-index:2; }
.sw.like{ left:12px; color:#bdf5cd; background:rgba(70,192,106,.18); border:1px solid var(--up); }
.sw.nope{ right:12px; color:#ffd1c8; background:rgba(240,86,58,.16); border:1px solid var(--down); }
.new-pill{ font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:700; letter-spacing:.12em; color:#15171b; background:var(--amber); border-radius:5px; padding:1px 6px; }
.card.onboard{ border-left-color:var(--amber); background:linear-gradient(180deg, rgba(242,169,59,.10), var(--panel)); }
.onb-steps{ display:flex; gap:10px; margin:2px 0 4px; flex-wrap:wrap; }
.onb-step{ font-size:12.5px; color:var(--muted); display:flex; align-items:center; gap:7px; }
.onb-arrow{ font-family:'JetBrains Mono',monospace; font-weight:700; }
@keyframes wobble{ 0%,100%{ transform:translateX(0) rotate(0); } 18%{ transform:translateX(11px) rotate(1.6deg); } 38%{ transform:translateX(-9px) rotate(-1.3deg); } 58%{ transform:translateX(6px) rotate(.8deg); } 78%{ transform:translateX(-3px); } }
.hintwobble{ animation:wobble 1.5s ease-in-out .4s 2; }
@media (prefers-reduced-motion:reduce){ .hintwobble{ animation:none; } }
.card-top{ display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.cat{ font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; }
.persona{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--faint); letter-spacing:.04em; }
.down{ margin-left:auto; background:transparent; border:none; color:var(--faint); font-size:11.5px; cursor:pointer; font-family:'Inter',sans-serif; padding:2px 4px; }
.down:hover{ color:var(--down); }
.h{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:18px; line-height:1.22; margin:0 0 7px; letter-spacing:-.01em; }
.h a:hover{ color:var(--amber); }
.p{ margin:0 0 9px; font-size:14px; line-height:1.5; color:var(--body); }
/* "Why it matters" is a small "i" that uncollapses an inline section in the card
   (the card just grows — no clipping by .card overflow:hidden). */
.why-i{ display:inline-flex; align-items:center; justify-content:center; min-width:17px; height:18px; border-radius:9px; border:1px solid var(--line); background:transparent; color:var(--faint); font-family:'JetBrains Mono',monospace; font-size:9.5px; font-style:italic; cursor:pointer; user-select:none; padding:0 8px; position:relative; }
.why-i::after, .listen::after, .rtip-x::after{ content:""; position:absolute; inset:-11px; }   /* 44px-ish hit slop on daily-use controls */
.why-i:hover, .why-i[aria-expanded="true"]{ color:var(--amber); border-color:var(--amber); }
.why-pop{ margin:2px 0 10px; font-size:12.5px; line-height:1.45; color:var(--muted); border-top:1px dashed var(--line); padding-top:8px; }
.why-pop[hidden]{ display:none; }
.why-pop b{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--amber); margin-right:7px; font-weight:600; }
.card-foot{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.type{ font-size:11px; color:var(--muted); border:1px solid var(--line); border-radius:6px; padding:1px 7px; background:transparent; cursor:pointer; font-family:'Inter',sans-serif; }
.type:hover{ color:var(--down); border-color:var(--down); }
.move{ font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; }
.src{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--faint); }
.listen{ margin-left:auto; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; border:1px solid var(--line); background:transparent; color:var(--muted); font-size:10px; cursor:pointer; padding:0; position:relative; }
.listen:hover, .listen.playing{ color:var(--amber); border-color:var(--amber); }
.listen.loading{ opacity:.6; }

.skeletons{ display:flex; flex-direction:column; gap:12px; }
.sk{ height:104px; border-radius:13px; border:1px solid var(--line); background:linear-gradient(100deg, var(--panel) 30%, var(--panel2) 50%, var(--panel) 70%); background-size:200% 100%; animation:sheen 1.4s ease-in-out infinite; }
@keyframes sheen{ from{background-position:200% 0} to{background-position:-200% 0} }
.empty{ text-align:center; padding:34px 16px; }
.empty-h{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:17px; margin-bottom:8px; }
.empty-p{ color:var(--muted); font-size:13.5px; max-width:420px; margin:0 auto 14px; line-height:1.5; }

.diag{ max-width:340px; margin:14px auto 0; text-align:left; background:var(--panel); border:1px solid var(--line); border-radius:11px; padding:12px 14px; }
.diag-h{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
.diag-row{ display:flex; align-items:center; gap:9px; padding:4px 0; font-size:13px; }
.diag-dot{ width:7px; height:7px; border-radius:50%; flex:0 0 auto; }
.diag-name{ flex:1; }
.diag-stat{ font-family:'JetBrains Mono',monospace; font-size:11.5px; }

.foot{ max-width:760px; margin:28px auto 0; padding:0 20px; text-align:center; font-size:11.5px; color:var(--faint); line-height:1.6; }
.toast{ position:fixed; left:50%; bottom:20px; transform:translateX(-50%); background:var(--panel2); border:1px solid var(--line); border-radius:11px; padding:10px 14px; display:flex; align-items:center; gap:14px; font-size:13px; box-shadow:0 10px 30px rgba(0,0,0,.4); z-index:20; }
.toast button{ background:transparent; border:none; color:var(--amber); font-weight:600; cursor:pointer; font-size:13px; font-family:'Inter',sans-serif; }
@media (max-width:520px){ .title{ font-size:32px; } .hello{ font-size:25px; } .mast{ align-items:flex-start; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ---- built-in desk presentation -----------------------------------------
const CATS = {
  liverpool: { label:"Liverpool",      accent:"var(--red)",    persona:"The Campaigner · ENFP", voice:"Breathless and optimistic — sees the upside, but honest about confirmed vs rumour.", types:["Confirmed","Transfer news","Injury update","Tactics","Press conference","Match preview"] },
  worcester: { label:"Worcester & UK", accent:"var(--green)",  persona:"The Consul · ESFJ",     voice:"Warm and neighbourly — practical local news that affects daily life.", types:["Local council","Roads & rail","Community","Local business","Events","UK national"] },
  gaming:    { label:"Gaming",         accent:"var(--violet)", persona:"The Debater · ENTP",    voice:"Quick-witted and irreverent — loves the business chess and the contradictions.", types:["Industry","Release","Review","Hardware","Esports","Deal"] },
  ev:        { label:"EV & Battery",   accent:"var(--teal)",   persona:"The Showman · ESTP",    voice:"Bombastic petrolhead in plain English — always in £ and real running costs.", types:["New EV","Home battery","Solar","Charging","Running costs","Tariffs"] },

// Podcast show styles (mirrors the worker's SHOW_STYLES keys).
const SHOWS = {

  greenroom: { label:"The Green Room",desc:"Warm evening magazine" },

const LS = { uid:"jackwire:uid", profile:"jackwire:profile", read:"jackwire:read" };

// ---- identity + profile (persisted locally, synced to the server) --------
function getUid(){
  let u = null; try{ u = localStorage.getItem(LS.uid); }catch(_){}  // storage can throw (blocked site data) — degrade, don't blank the app
  if(!u || !/^[A-Za-z0-9_-]{8,64}$/.test(u)){

        : "u"+Math.random().toString(36).slice(2)+Date.now().toString(36)).slice(0,40);
    try{ localStorage.setItem(LS.uid, u); }catch(_){}
  }
  return u;
}
function loadProfile(){
  try{ const p = JSON.parse(localStorage.getItem(LS.profile)); if(p && p.desks) {
    p.desks.disabled = p.desks.disabled||[]; p.desks.custom = p.desks.custom||[]; p.weights = p.weights||{}; return p;
  } }catch(_){}

}

const state = {
  uid: getUid(),
  profile: loadProfile(),
  data: null, error: null, loading: true, filter: "all", awaitGen: null, armNext: false,
  showSettings: false, showAddDesk: false, toast: null,
  read: new Set(), dismissed: new Set(), seen: {}, cooldown: null,
  seenBefore: (function(){ try{ return localStorage.getItem("jackwire:lastseen")||""; }catch(_){ return ""; } })(),
  onboard: (function(){ try{ return localStorage.getItem("jackwire:onboarded")!=="1"; }catch(_){ return true; } })(),
  auth: { enabled:false, signedIn:false, email:null, name:null },

function markSetupDone(){ state.setupDone=true; try{ localStorage.setItem("jackwire:setup","1"); }catch(_){} }
function profileCustomised(){ const d=state.profile.desks, p=state.profile;
  return (d.disabled&&d.disabled.length)||(d.custom&&d.custom.length)||Object.keys(p.weights||{}).length
    ||Object.keys(p.notes||{}).length||((p.deskOrder||[]).length)||Object.keys(p.styles||{}).length||!!p.window||!!p.show; }

const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
// Fallback "source" for items the routine didn't label: the URL's domain.
const domainOf = u => { try { return new URL(String(u)).hostname.replace(/^www\./,""); } catch(_) { return ""; } };
// Relative "on the wire since" age from addedAt (ingest time, the honest stamp we have).
const relAge = iso => { const m=(Date.now()-Date.parse(iso))/60000; if(!isFinite(m)||m<0) return "";
  if(m<60) return Math.max(1,Math.round(m))+"m ago"; const h=m/60; if(h<24) return Math.round(h)+"h ago"; return Math.round(h/24)+"d ago"; };
const longDate = () => new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
function londonHour(){ try{ return parseInt(new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",hour:"2-digit",hour12:false}).format(new Date()),10)%24; }catch(_){ return new Date().getHours(); } }
const greeting = () => { const h=londonHour(); return h<12?"Good morning":h<18?"Good afternoon":"Good evening"; };
const isNew = it => !!(it.addedAt && state.seenBefore && String(it.addedAt) > String(state.seenBefore));
function markSeen(){ try{ localStorage.setItem("jackwire:lastseen", new Date().toISOString()); }catch(_){} }
function dismissOnboard(){ state.onboard=false; try{ localStorage.setItem("jackwire:onboarded","1"); }catch(_){} render(); }

// ---- desk helpers (built-in + custom) ------------------------------------
function customById(id){ return (state.profile.desks.custom||[]).find(d=>d.id===id); }
function cat(id){
  if(CATS[id]) return CATS[id];
  const cd = customById(id) || ((state.data&&state.data.desks)||[]).find(x=>x.id===id);
  const label = cd ? (cd.label||id) : id;
  let h=0; for(const ch of String(id)) h=(h*31+ch.charCodeAt(0))>>>0;
  return { label, accent: PALETTE[h % PALETTE.length], persona: (cd&&cd.voiceName) ? cd.voiceName : "Custom desk" };
}
// Apply the reader's saved filter order (profile.deskOrder) first, then any
// desks they haven't explicitly placed, in their natural order.
function orderByPref(ids){
  const pref = (state.profile.deskOrder||[]).filter(id => ids.includes(id));
  const rest = ids.filter(id => !pref.includes(id));
  return [...pref, ...rest];
}
function deskOrder(){
  const ids = state.data && Array.isArray(state.data.desks) && state.data.desks.length
    ? state.data.desks.map(d=>d.id)
    : BUILTIN_ORDER.concat((state.profile.desks.custom||[]).map(d=>d.id));
  const disabled = state.profile.desks.disabled||[];
  return orderByPref(ids.filter(id => !disabled.includes(id)));
}
// Every desk (incl. disabled) in the reader's order — for the settings list.
function allDesksOrdered(){
  return orderByPref(BUILTIN_ORDER.concat((state.profile.desks.custom||[]).map(d=>d.id)));
}
function moveDesk(id, dir){
  const order = allDesksOrdered();
  const i = order.indexOf(id); if(i<0) return;
  const j = i + dir; if(j<0 || j>=order.length) return;
  [order[i], order[j]] = [order[j], order[i]];
  state.profile.deskOrder = order;
  saveProfile(); render();
}
// Drag-to-reorder a filter pill: drop `dragId` in front of `targetId`.
let _dragDesk = null;
function reorderDesks(dragId, targetId){
  if(!dragId || dragId===targetId) return;
  const order = allDesksOrdered();
  const from = order.indexOf(dragId); if(from<0) return;
  order.splice(from, 1);
  let to = targetId ? order.indexOf(targetId) : -1;
  if(to<0) to = order.length;
  order.splice(to, 0, dragId);
  state.profile.deskOrder = order;
  saveProfile(); render();
}

// ---- learning ------------------------------------------------------------
function w(){ return state.profile.weights; }
function bump(key, delta){ w()[key] = Math.max(-10, Math.min(10, (w()[key]||0) + delta)); }
function score(it){ return (w()[it.contentType]||0) + (w()["desk:"+it.category]||0); }
// Feed ranking: blend freshness, what you've learned to like, and unseen-ness —
// so a story from a desk/type you love can rise above a slightly-newer neutral
// one, while genuinely fresh news still leads. Higher = nearer the top.
function rankScore(it){
  let rec = 0;
  if(it.addedAt){ const ageH = (Date.now() - Date.parse(it.addedAt)) / 3600000; rec = Math.max(0, 24 - ageH); } // ~24 fresh → 0 over a day
  const newBoost = isNew(it) ? 3 : 0;
  const sal = it.salience ? (it.salience - 3) * 5 : 0;   // editorial prominence (1-5 from the researcher): a front-pager beats ~10h of recency
  return rec + newBoost + sal + score(it) * 2; // recency(hrs) + new nudge + world salience + learned preference
}
function deskTypes(id){ if(CATS[id]) return CATS[id].types||[]; const cd=customById(id); return (cd&&cd.types)||[]; }

// How a desk's personality is currently leaning, from what you like/dislike.
function deskLean(id){
  const ww = w(); const deskW = ww["desk:"+id]||0; const types = deskTypes(id);
  const liked = types.filter(t=>(ww[t]||0)>0).sort((a,b)=>(ww[b]||0)-(ww[a]||0));
  const disliked = types.filter(t=>(ww[t]||0)<0).sort((a,b)=>(ww[a]||0)-(ww[b]||0));
  const head = deskW>=2 ? "Turned up — leaning into what you love here"
    : deskW<=-2 ? "Kept tight — higher bar, only the strongest"
    : (liked.length||disliked.length) ? "Tuning to your taste"
    : "Learning your taste — swipe to shape it";
  const bits = [];
  if(liked.length) bits.push("more "+liked.slice(0,2).join(", "));
  if(disliked.length) bits.push("less "+disliked.slice(0,2).join(", "));
  return { head, detail: bits.join(" · ") };
}

// ---- durable seen/dismissed history (rolling 7 days, keyed by article) -----
// Mirrors the server's itemKey so a story you've read or dismissed stays gone
// even when it re-surfaces under a fresh id on a later build or the next day
// (the per-day `read` set, keyed by ephemeral id, can't do that on its own).
const normTitleC = t => String(t==null?"":t).toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
const itemKeyClient = it => (it && it.url && String(it.url).trim())
  ? "u:"+String(it.url).trim().toLowerCase()
  : "t:"+((it&&it.category)||"")+"|"+normTitleC(it&&it.title);
const DISMISS_TTL = 7*24*60*60*1000; // keep dismissals for 7 days
function readDismissMap(){ try{ return JSON.parse(localStorage.getItem("jackwire:dismissed")||"{}")||{}; }catch(_){ return {}; } }
function writeDismissMap(m){ try{ localStorage.setItem("jackwire:dismissed", JSON.stringify(m)); }catch(_){} }
function loadDismissed(){
  const m = readDismissMap(), cut = Date.now() - DISMISS_TTL, out = {};
  for(const k in m){ if(m[k] > cut) out[k] = m[k]; } // prune expired
  writeDismissMap(out);
  return new Set(Object.keys(out));
}
function addDismissed(it){ const k = itemKeyClient(it); if(!k) return; const m = readDismissMap(); m[k] = Date.now(); writeDismissMap(m); state.dismissed.add(k); }
function undoDismissed(it){ const k = itemKeyClient(it); if(!k) return; const m = readDismissMap(); delete m[k]; writeDismissMap(m); state.dismissed.delete(k); }
state.dismissed = loadDismissed();

// "Already seen" — articles shown in a PRIOR session are hidden so the same
// story doesn't reappear day-to-day. Recorded on display; filtered only when
// seen BEFORE this session started, so reloading now never shrinks the feed.
// Rolling 7 days, per-user (so skipping a day still surfaces that day's news).
const SEEN_TTL = 7*24*60*60*1000;
const SESSION_START = Date.now();
function readSeenMap(){ try{ return JSON.parse(localStorage.getItem("jackwire:seen")||"{}")||{}; }catch(_){ return {}; } }
function writeSeenMap(m){ try{ localStorage.setItem("jackwire:seen", JSON.stringify(m)); }catch(_){} }
function loadSeen(){ const m=readSeenMap(), cut=Date.now()-SEEN_TTL, out={}; for(const k in m){ if(m[k]>cut) out[k]=m[k]; } writeSeenMap(out); return out; }
function recordSeen(items){ if(!Array.isArray(items)||!items.length) return; const m=readSeenMap(), now=Date.now(); for(const it of items){ const k=itemKeyClient(it); if(k) m[k]=now; } writeSeenMap(m); state.seen=m; }
function seenPrior(it){ const t = state.seen && state.seen[itemKeyClient(it)]; return !!(t && t < SESSION_START); }
state.seen = loadSeen();

function baseItems(){
  if(!state.data || !state.data.items) return [];
  const disabled = state.profile.desks.disabled||[];
  return state.data.items
    .filter(i => !state.read.has(i.id) && !state.dismissed.has(itemKeyClient(i)) && !seenPrior(i))
    .filter(i => !disabled.includes(i.category))
    .filter(i => (w()[i.contentType]||0) > MUTE_FLOOR);
}
function visibleItems(){
  return baseItems()
    .filter(i => state.filter==="all" || i.category===state.filter)
    // intelligent rank: freshness + learned preference + unseen-ness
    .sort((a,b)=> rankScore(b) - rankScore(a));
}
function newCount(){ return baseItems().filter(isNew).length; }
function counts(){ const c={}; deskOrder().forEach(id=> c[id]= baseItems().filter(i=>i.category===id).length); return c; }

// ---- read (dismissed-today) persistence ----------------------------------
function hydrateRead(date){
  try{ const r=JSON.parse(localStorage.getItem(LS.read)||"null"); state.read = (r && r.date===date) ? new Set(r.ids) : new Set(); }
  catch(_){ state.read = new Set(); }
}
function saveRead(){ try{ localStorage.setItem(LS.read, JSON.stringify({ date: state.data&&state.data.date, ids:[...state.read] })); }catch(_){} }

// ---- server sync ---------------------------------------------------------
function profileForServer(){
  const dis = state.profile.desks.disabled||[];
  const enabled = dis.length ? BUILTIN_ORDER.filter(id=>!dis.includes(id)) : null;
  return { desks:{ enabled, custom: state.profile.desks.custom||[] }, weights: w(), notes: state.profile.notes||{}, deskOrder: state.profile.deskOrder||[],
    styles: state.profile.styles||{}, window: state.profile.window||null, show: state.profile.show||null };
}
async function putProfile(regenerate){
  // Personalising is a signed-in feature now; anon tuning stays local-only so we
  // don't fire 401s at the server. The shared feed still works for everyone.
  if(!state.auth.signedIn) return false;
  try{
    const r = await fetch("/api/profile", { method:"PUT", headers:{"content-type":"application/json"},
      body: JSON.stringify({ profile: profileForServer(), regenerate: !!regenerate }) });
    return r.ok;   // callers waiting on a rebuild need to know if it was even requested (e.g. session expired → 401)
  }catch(_){ return false; }
}

// ---- account / sign-in --------------------------------------------------
async function fetchMe(){
  try{ const r = await fetch("/api/me"); const d = await r.json();
    state.auth = { enabled: !!d.appleEnabled, signedIn: !!d.signedIn, email: d.email||null, name: d.name||null };
  }catch(_){}
}
// Convert the server's profile shape ({desks:{enabled,custom}}) to the client's
// ({desks:{disabled,custom}}) and adopt it — used so a signed-in profile syncs.
function adoptServerProfile(sp){
  if(!sp || !sp.desks) return;
  const enabled = Array.isArray(sp.desks.enabled) ? sp.desks.enabled : null;
  const disabled = enabled ? BUILTIN_ORDER.filter(id=>!enabled.includes(id)) : [];
  state.profile = { desks:{ disabled, custom: Array.isArray(sp.desks.custom)?sp.desks.custom:[] }, weights: sp.weights||{}, notes: sp.notes||{}, deskOrder: Array.isArray(sp.deskOrder)?sp.deskOrder:[],
    styles: sp.styles||{}, window: sp.window||null, show: sp.show||null };

}
async function loadServerProfile(){
  try{ const r = await fetch("/api/profile", { headers:{ "x-user-id": state.uid } }); const d = await r.json();
    if(d && d.profile){ adoptServerProfile(d.profile); return true; }
  }catch(_){}
  return false;
}
let _wt;
function syncWeights(){ saveProfile(); clearTimeout(_wt); _wt = setTimeout(()=>putProfile(false), 1500); }
let _dt;
function syncDesks(){ // desk set changed → regenerate, then poll until the rebuilt briefing lands
  saveProfile();
  state.loading = true; render();
  clearTimeout(_dt);
  // Arm on the NEXT fetch's generatedAt (see load), not the possibly-stale one
  // on screen — a cron build landing in between would end the wait early.
  // Signed-in only: anon edits are local filters, no rebuild ever arrives.
  state.armNext = !!state.auth.signedIn;
  _dt = setTimeout(()=>{ putProfile(true).then(ok=>{ if(!ok){ state.armNext=false; state.awaitGen=null; } load(false); }); }, 1000);
}
let _nt;
// Shared "content preference changed → rebuild" kickoff (notes, writer styles,
// freshness window): save, arm the poll on the next fetch's stamp, debounce the
// regenerate PUT. Signed-in only — anon preferences sync on first sign-in.
function queueRebuild(ms){
  saveProfile();
  clearTimeout(_nt);
  state.armNext = !!state.auth.signedIn;
  _nt = setTimeout(()=>{ putProfile(true).then(ok=>{ if(!ok){ state.armNext=false; state.awaitGen=null; } load(false); }); }, ms||1200);
}
function setDeskNote(id, txt){ // per-desk reader instruction → rebuild that feed
  if(!id) return;
  state.profile.notes = state.profile.notes || {};
  const v = String(txt||"").replace(/[\r\n]+/g," ").trim().slice(0,280);
  if(v === (state.profile.notes[id]||"")) return; // no change
  if(v) state.profile.notes[id] = v; else delete state.profile.notes[id];
  queueRebuild(1500);
}
function setDeskStyle(id, v){ // per-desk written register → rebuild
  if(!id) return;
  state.profile.styles = state.profile.styles || {};
  if(v && v!=="colour") state.profile.styles[id] = v; else delete state.profile.styles[id];
  queueRebuild();
}
function setFreshWindow(v){ // global freshness window → rebuild
  state.profile.window = v || null;
  queueRebuild();
}
function setShowStyle(v){ // podcast show style → next episode is produced in it
  state.profile.show = (v && v!=="briefing") ? v : null;
  queueRebuild();
  render();   // move the ✓ immediately
}

// ---- data load + background-build polling --------------------------------
async function fetchData(force){
  const res = force
    ? await fetch("/api/refresh", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ userId: state.uid }) })
    : await fetch("/api/today", { headers:{ "x-user-id": state.uid } });
  window.__lastFetch = Date.now();
  return res.json();
}
// NOTE: "seen" is recorded per-card as it scrolls into view (see wire()), NOT
// here — recording the whole payload on fetch meant a five-second glance hid
// the entire unread edition from the next visit.
function applyData(data){ state.data = data; hydrateRead(data.date); if(data.items && data.items.length) markSeen(); }
const isBuilding = d => d && d.generating && (!d.items || !d.items.length);
// Keep polling while an empty build runs, OR while a rebuild we kicked off
// (manual refresh, desk change) hasn't landed — i.e. generatedAt hasn't moved
// past what we were showing when we asked. The old empty-feed-only check meant
// Refresh and desk edits never actually delivered the new briefing.
const shouldPoll = d => isBuilding(d) || (d && d.generating && d.interim)
  || (state.awaitGen != null && d && String(d.generatedAt||"") === state.awaitGen);

// A routine refresh takes minutes to land, so lock the Refresh button for ~5 min
// after a manual refresh (persisted, so a page reload doesn't bypass it).
const REFRESH_LOCK_MS = 5 * 60 * 1000;
function refreshLockMsLeft(){ try{ return Math.max(0, (Number(localStorage.getItem("jackwire:refreshlock")) || 0) - Date.now()); }catch(_){ return 0; } }
function lockRefresh(){ try{ localStorage.setItem("jackwire:refreshlock", String(Date.now() + REFRESH_LOCK_MS)); }catch(_){} }

async function load(force){
  clearTimeout(window.__poll); window.__pollN = 0;
  state.loading = true; state.error = null; state.cooldown = null; render();
  try{
    const data = await fetchData(force);
    if (data.error) throw new Error(data.detail || data.error);
    // Only lock Refresh if a routine run actually started — not when throttled
    // or skipped — so the button doesn't claim "Refreshing…" when nothing ran.
    if (force && data.refresh && data.refresh.fired) lockRefresh();
    // A rebuild we kicked off (refresh fire, desk edit) arms awaitGen off THIS
    // fetch's stamp: poll until generatedAt moves past it.
    if ((force && data.refresh && data.refresh.fired) || state.armNext){ state.awaitGen = String(data.generatedAt||""); state.armNext = false; }
    applyData(data);
    state.cooldown = (data.refresh && data.refresh.throttled) ? (data.refresh.retryInSec || 0) : null;
    if (shouldPoll(data)){ window.__poll = setTimeout(poll, 4000); }
    else { state.loading = false; state.awaitGen = null; }
  }catch(e){ state.error = String(e.message || e); state.loading = false; state.awaitGen = null; state.armNext = false; }
  render();
}
async function poll(){
  // Bound the poll so a stuck/throttled build can't spin the loader forever.
  // A routine rebuild takes minutes, so back off to 10s after the first minute;
  // ~60 ticks ≈ 8½ min total, then show whatever's cached.
  if ((window.__pollN = (window.__pollN || 0) + 1) > 60){
    // Give up honestly: clear the generating/interim flags so the UI shows
    // what's cached (or the desk report) instead of a stale "researching" state.
    if(state.data){ state.data.generating = false; delete state.data.interim; }
    state.loading = false; state.awaitGen = null; render(); return;
  }
  const wait = state.cooldown ? 15000 : (window.__pollN > 15 ? 10000 : 4000);   // throttled fire → generatedAt can't move for minutes; poll gently
  try{
    const data = await fetchData(false);
    if(!data.error){
      const awaited = state.awaitGen != null;
      const prevKeys = awaited && state.data && state.data.items ? new Set(state.data.items.map(itemKeyClient)) : null;
      const changed = !state.data || String(data.generatedAt||"") !== String(state.data.generatedAt||"")
        || (data.items||[]).length !== ((state.data.items)||[]).length;
      applyData(data);
      state.cooldown = (data.refresh && data.refresh.throttled) ? (data.refresh.retryInSec || 0) : null;
      if(shouldPoll(data)){
        window.__poll = setTimeout(poll, wait);
        if(changed) render();   // repaint only on real change — a 4s full re-render wiped open panels and half-typed notes
        return;
      }
      state.loading = false; state.awaitGen = null;
      // The rebuild we were waiting on just landed: say what it delivered.
      if(awaited && prevKeys){
        const freshN = (data.items||[]).filter(i=>!prevKeys.has(itemKeyClient(i))).length;
        state.toast = { msg: freshN ? `${freshN} new ${freshN===1?"story":"stories"} pulled` : "Nothing new — you’re up to date" };
        clearTimeout(window.__tt); window.__tt = setTimeout(()=>{ state.toast=null; render(); }, 4200);
      }
    } else { window.__poll = setTimeout(poll, 5000); return; }
  }catch(_){ window.__poll = setTimeout(poll, 5000); return; }
  render();
}

// ---- swipe actions -------------------------------------------------------
function swipeRight(it){
  bump(it.contentType, 1); bump("desk:"+it.category, .5);
  state.read.add(it.id); addDismissed(it); saveRead(); syncWeights();
  // One-time confirmation so the first right swipe teaches its consequence.
  let first=false; try{ first=!localStorage.getItem("jackwire:swiped"); if(first) localStorage.setItem("jackwire:swiped","1"); }catch(_){}
  if(first){ state.toast={msg:`Read ✓ — your ${cat(it.category).label} desk noted you like ${it.contentType}`}; clearTimeout(window.__tt); window.__tt=setTimeout(()=>{state.toast=null;render();},4200); }
  render();
}
function swipeLeft(it){
  const before = w()[it.contentType]||0;
  bump(it.contentType, -1.5); bump("desk:"+it.category, -.5);
  state.read.add(it.id); addDismissed(it); saveRead();
  // Crossing the mute floor silently vanished a whole story type — say so.
  const nowMuted = (w()[it.contentType]||0) <= MUTE_FLOOR && before > MUTE_FLOOR;
  state.toast = { msg: nowMuted ? `Muted “${it.contentType}” — you won’t see these again` : `Less like “${it.contentType}”`,
    undo:{ id:it.id, it, type:it.contentType, cat:it.category, d:[1.5,.5] } };
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>{ state.toast=null; render(); }, nowMuted ? 6000 : 4200);
  syncWeights(); render();
}
function undo(){
  const u = state.toast && state.toast.undo; if(!u) return;
  if(u.restore){ restoreType(u.restore); return; }   // mute-chip undo: just unmute
  state.read.delete(u.id); if(u.it) undoDismissed(u.it); bump(u.type, u.d[0]); bump("desk:"+u.cat, u.d[1]);
  state.toast = null; saveRead(); syncWeights(); render();
}
function muteType(t){
  w()[t] = MUTE_FLOOR - 1;
  state.toast = { msg:`Muted “${t}” — restore any time in ⚙`, undo:{ restore:t } };
  clearTimeout(window.__tt); window.__tt = setTimeout(()=>{ state.toast=null; render(); }, 4200);
  syncWeights(); render();
}
function restoreType(t){ delete w()[t]; state.toast = null; syncWeights(); render(); }
function mutedTypes(){ return Object.keys(w()).filter(k=>!k.startsWith("desk:") && w()[k] <= MUTE_FLOOR); }

// ---- desk management -----------------------------------------------------
function toggleBuiltin(id){
  const dis = state.profile.desks.disabled;
  const disabling = !dis.includes(id);
  state.profile.desks.disabled = disabling ? [...dis, id] : dis.filter(x=>x!==id);
  if(disabling && state.filter===id) state.filter="all";   // don't strand the feed on a hidden desk's filter
  if(disabling){ saveProfile(); putProfile(false); render(); }   // hiding is instant + client-side; no rebuild needed
  else syncDesks();                                              // enabling needs the desk researched
}
function addCustomDesk(label, topic, voice){
  topic = (topic||"").trim(); label = (label||"").trim() || topic.slice(0,28);
  if(!topic) return;
  if(!state.auth.signedIn){ state.toast={msg:"Sign in with Apple to add your own desks"}; render(); clearTimeout(window.__tt); window.__tt=setTimeout(()=>{state.toast=null;render();},3500); return; }
  const id = "c"+Math.random().toString(36).slice(2,8);
  state.profile.desks.custom.push({ id, label, topic, voice:(voice||"").trim(), voiceName:label, types:[] });
  state.showAddDesk = false;
  syncDesks();
}
function removeCustomDesk(id){
  state.profile.desks.custom = state.profile.desks.custom.filter(d=>d.id!==id);
  if(state.filter===id) state.filter="all";
  syncDesks();
}

// ---- onboarding picker ---------------------------------------------------
async function loadCatalogue(){
  try{ const r = await fetch("/api/catalogue"); state.catalogue = await r.json(); }
  catch(_){ state.catalogue = { groups: [], location: null, error: true }; }
  indexCatalogue();
}
function indexCatalogue(){
  const prev = state.deskIndex || {};
  state.deskIndex = {}; const c = state.catalogue; if(!c) return;
  (c.groups||[]).forEach(g=>g.desks.forEach(d=> state.deskIndex[d.id]=d));
  if(c.location) state.deskIndex[c.location.id]=c.location;
  // Keep user-designed desks across catalogue refetches — they only exist here.
  for(const id in prev){ if(!state.deskIndex[id] && state.picked.has(id)) state.deskIndex[id]=prev[id]; }
}
function pickAccent(d){ return (d.builtin && CATS[d.id]) ? CATS[d.id].accent : (d.location ? "var(--amber)" : cat(d.id).accent); }
function pickCard(d){
  const on = state.picked.has(d.id);
  const needsAuth = !d.builtin && state.auth.enabled && !state.auth.signedIn;
  const persona = (d.builtin && CATS[d.id]) ? CATS[d.id].persona
    : (d.location ? "Local desk" : "New desk") + (needsAuth ? " · sign in to keep" : "");
  const p = d.pitch;
  return `<button class="pick ${on?'on':''} ${d.location?'pick-local':''}" data-pick="${esc(d.id)}" style="--ac:${pickAccent(d)}">
    <div class="pick-top"><span class="pick-name">${esc(d.label)}</span><span class="pick-check">${on?'✓':'+'}</span></div>
    <div class="pick-persona">${esc(persona)}</div>
    ${p ? `<div class="pick-pitch"><span class="pick-h">${esc(p.title)}</span>${p.source?` <span class="pick-src">${esc(p.source)}</span>`:''}${p.blurb?`<div class="hint" style="margin-top:3px">${esc(p.blurb)}</div>`:''}</div>`
        : `<div class="pick-pitch pick-quiet">first stories arriving…</div>`}
  </button>`;
}
function previewHtml(){
  const pv = state.preview; if(!pv) return "";
  if(pv.loading) return `<div class="hint" style="margin-top:12px">Designing your desk and fetching a sample story…</div>`;
  if(pv.error) return `<div class="hint" style="margin-top:12px; color:var(--down)">${esc(pv.error)}</div>
    ${(!state.auth.signedIn && state.auth.enabled) ? `<a class="apple-btn" href="/auth/apple/login?u=${encodeURIComponent(state.uid)}"> Sign in with Apple</a>` : ""}`;
  if(pv.added) return `<div class="preview-card"><div class="pick-name">✓ ${esc((pv.data&&pv.data.label)||pv.topic)} added to your wire</div></div>`;
  const d = pv.data;
  return `<div class="preview-card">
    <div class="pick-name">${esc(d.label||pv.topic)}</div>
    <div class="pick-persona">${esc(d.persona||'New desk')}</div>
    ${d.voice?`<div class="desk-voice">${esc(d.voice)}</div>`:''}
    ${d.sample?`<div class="preview-sample"><span class="pick-h" style="font-weight:600">${esc(d.sample.title)}</span>
      ${d.sample.summary?`<p class="p" style="margin:6px 0 0">${esc(d.sample.summary)}</p>`:''}
      ${d.sample.source?`<div style="margin-top:4px"><span class="pick-src">${esc(d.sample.source)}</span></div>`:''}</div>`:''}
    <div class="row" style="margin-top:11px"><button class="minibtn" id="setup-add">＋ Add this desk</button></div>
  </div>`;
}
function renderPicker(){
  const app = document.getElementById("app");
  const c = state.catalogue;
  // Preserve a half-typed custom-desk topic across re-renders (every tap
  // re-renders the picker; losing the draft made "reword it" mean "retype it").
  const draftEl = document.getElementById("setup-topic");
  if(draftEl) state.draftTopic = draftEl.value;
  const skipFoot = `<div class="setup-foot"><button class="linkbtn" id="setup-skip">Skip — read today’s edition</button>${(state.auth.enabled && !state.auth.signedIn)?`<a class="linkbtn" href="/auth/apple/login?u=${encodeURIComponent(state.uid)}">Sign in</a>`:""}</div>`;
  const wireSkip = ()=>{ const sk=document.getElementById("setup-skip"); if(sk) sk.onclick=()=>{ markSetupDone(); state.createOpen=false; render(); load(false); }; };
  if(!c){
    app.innerHTML = `<div class="setup"><div class="setup-head"><div class="eyebrow">The Wire · Build your wire</div><h1>${greeting()}. Your own news desk.</h1><p>Fresh news researched for you three times a day — British English, £, no ads, with a daily podcast. Fetching today’s desks…</p></div><div class="skeletons" style="margin-top:18px">${"<div class='sk'></div>".repeat(4)}</div></div>${skipFoot}`;
    wireSkip(); return;
  }
  if(c.error && !(c.groups||[]).length){
    app.innerHTML = `<div class="setup"><div class="setup-head"><div class="eyebrow">The Wire · Build your wire</div><h1>${greeting()}.</h1><p>Couldn’t load the desk catalogue — you can retry, or skip straight to today’s edition.</p></div><div class="row" style="margin-top:14px"><button class="refresh" id="setup-retry">Try again</button></div></div>${skipFoot}`;
    const rt=document.getElementById("setup-retry");
    if(rt) rt.onclick=()=>{ state.catalogue=null; renderPicker(); loadCatalogue().then(renderPicker); };
    wireSkip(); return;
  }
  const n = state.picked.size;
  const groupHint = {
    "Sport": "Your team or sport — e.g. ‘Arsenal’, ‘Leeds United’, ‘UFC’",
    "Tech & Science": "e.g. ‘quantum computing’, ‘Apple’, ‘biotech’",
    "Money": "e.g. ‘Tesla stock’, ‘pensions’, ‘small business’",
    "Culture": "e.g. ‘A24 films’, ‘vinyl records’, ‘fantasy books’",
    "News": "e.g. ‘your local council’, ‘immigration’, ‘elections’",
  };
  const createBox = name => `<div class="create-box">
      <input id="setup-topic" maxlength="120" value="${esc(state.draftTopic||'')}" placeholder="${esc(groupHint[name]||'Any topic — e.g. ‘baking’, ‘climate tech’')}" />
      <div class="row" style="margin-top:9px"><button class="minibtn" id="setup-preview">See it</button><button class="linkbtn" id="setup-create-cancel">Cancel</button></div>
      ${previewHtml()}
    </div>`;
  const loc = c.location ? `<section class="setup-sec"><h2>Near you</h2><div class="pick-grid">${pickCard(c.location)}</div></section>` : "";
  const groups = (c.groups||[]).map(g=>{
    const open = state.createOpen && state.createGroup===g.name;
    const tile = `<button class="pick pick-create" data-create-group="${esc(g.name)}">＋ Add your own ${esc(g.name.split(" ")[0].toLowerCase())} desk</button>`;
    return `<section class="setup-sec"><h2>${esc(g.name)}</h2><div class="pick-grid">${g.desks.map(pickCard).join("")}${tile}</div>${open?createBox(g.name):""}</section>`;
  }).join("");
  app.innerHTML = `
    <div class="setup">
      <div class="setup-head">
        <div class="eyebrow">The Wire · Build your wire</div>
        <h1>${greeting()}. Your own news desk.</h1>
        <p>The Wire researches the topics you pick, three times a day — British English, £, no ads, with a daily podcast. Tap the desks you want; each is auditioning with its best story right now. Missing your team or topic? <strong style="color:var(--amber)">Add your own</strong> and watch it design itself. You can change desks any time in ⚙.</p>
      </div>
      ${loc}${groups}
    </div>
    <div class="setup-foot">
      <button class="refresh" id="setup-go" ${n?'':'disabled'}>${n?`Start reading · ${n} desk${n>1?'s':''}`:'Pick some desks'}</button>
      <button class="linkbtn" id="setup-skip">Skip — read today’s edition</button>
      ${(state.auth.enabled && !state.auth.signedIn)?`<a class="linkbtn" href="/auth/apple/login?u=${encodeURIComponent(state.uid)}">Sign in</a>`:""}
    </div>`;
  wirePicker();
  // Late pitches: the server fills missing ones AFTER responding, so tiles can
  // sit on the placeholder — refetch a couple of times and patch them in.
  const anyMissing = (c.groups||[]).some(g=>g.desks.some(d=>!d.pitch)) || (c.location && !c.location.pitch);
  if(anyMissing && (window.__pitchPolls||0) < 2 && !state.setupDone){
    window.__pitchPolls = (window.__pitchPolls||0) + 1;
    setTimeout(()=>{ if(!state.setupDone) loadCatalogue().then(()=>{ if(!state.setupDone && !state.createOpen) renderPicker(); }); }, window.__pitchPolls===1 ? 8000 : 25000);
  }
}
function wirePicker(){
  const $ = s => document.getElementById(s);
  document.querySelectorAll("[data-pick]").forEach(b=> b.onclick = ()=>{ const id=b.dataset.pick; state.picked.has(id)?state.picked.delete(id):state.picked.add(id); renderPicker(); });
  document.querySelectorAll("[data-create-group]").forEach(b=> b.onclick = ()=>{
    const g = b.dataset.createGroup;
    const same = state.createOpen && state.createGroup===g;
    state.createOpen = !same; state.createGroup = same ? null : g; state.preview = null; renderPicker();
  });
  $("setup-create-cancel") && ($("setup-create-cancel").onclick = ()=>{ state.createOpen=false; state.createGroup=null; state.preview=null; renderPicker(); });
  $("setup-preview") && ($("setup-preview").onclick = ()=> runPreview(($("setup-topic")||{}).value));
  const st = $("setup-topic");
  if(st){ st.oninput = ()=>{ state.draftTopic = st.value; }; st.onkeydown = e=>{ if(e.key==="Enter") runPreview(st.value); }; }
  $("setup-add") && ($("setup-add").onclick = ()=> addPreviewed());
  $("setup-skip") && ($("setup-skip").onclick = ()=>{ markSetupDone(); state.createOpen=false; render(); load(false); });
  $("setup-go") && ($("setup-go").onclick = ()=> finishSetup());
}
async function runPreview(topic){
  topic = (topic||"").trim(); if(!topic) return;
  if(state.preview && state.preview.loading) return;   // one design call at a time
  if(!state.auth.signedIn){ state.preview = { topic, error:"Sign in with Apple to design and keep your own desks." }; renderPicker(); return; }
  state.preview = { topic, loading:true }; renderPicker();
  try{
    const r = await fetch("/api/desk-preview", { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({ topic }) });
    const d = await r.json();
    if(d && d.error) state.preview = { topic, error: d.error };
    else state.preview = { topic, data: d };
  }catch(_){ state.preview = { topic, error:"Couldn’t reach the desk designer — try again." }; }
  renderPicker();
}
function addPreviewed(){
  const pv = state.preview; if(!pv || !pv.data) return;
  const id = "c"+Math.random().toString(36).slice(2,8);
  const personaName = (pv.data.persona||"").split("·")[0].trim() || pv.data.label;
  const desk = { id, label: pv.data.label || pv.topic, topic: pv.topic, voice: pv.data.voice||"", voiceName: personaName, types: Array.isArray(pv.data.types)?pv.data.types:[] };
  state.deskIndex[id] = desk; state.picked.add(id);
  // Confirm visibly before closing — an instantly-vanishing box read as "nothing happened".
  pv.added = true; state.draftTopic = "";
  const el = document.getElementById("setup-topic"); if(el) el.value = "";   // else renderPicker re-captures the old draft
  renderPicker();
  setTimeout(()=>{ if(state.preview===pv){ state.createOpen=false; state.createGroup=null; state.preview=null; renderPicker(); } }, 1400);
}
function finishSetup(){
  const picked = [...state.picked].map(id=>state.deskIndex[id]).filter(Boolean);
  let builtinPicked = picked.filter(d=>d.builtin).map(d=>d.id);
  let custom = picked.filter(d=>!d.builtin).map(d=>({
    id: d.id, label: d.label, topic: d.topic||d.label, voice: d.voice||"", voiceName: d.voiceName||d.label, types: Array.isArray(d.types)?d.types:[],
  }));
  // Custom desks are researched per ACCOUNT — signed out, they would never get
  // a single story. Keep the built-in picks and say so, and never finish into
  // a wire with every desk disabled (a permanently empty feed).
  if(!state.auth.signedIn && custom.length){
    custom = [];
    state.toast = { msg:"Custom desks need Apple sign-in — kept your built-in picks. Sign in via ⚙ to add the rest." };
    clearTimeout(window.__tt); window.__tt=setTimeout(()=>{state.toast=null;render();},5200);
  }
  if(!builtinPicked.length && !custom.length) builtinPicked = BUILTIN_ORDER.slice();
  const disabled = BUILTIN_ORDER.filter(id=>!builtinPicked.includes(id));
  // Merge, don't replace: re-running setup must not destroy learned weights,
  // desk notes, or a saved pill order.
  state.profile = { desks:{ disabled, custom },
    weights: state.profile.weights||{}, notes: state.profile.notes||{}, deskOrder: state.profile.deskOrder||[] };
  saveProfile(); markSetupDone(); state.createOpen=false;
  state.armNext = !!state.auth.signedIn;   // poll until the first personalised build lands
  render();                          // switch to the feed (building state)
  putProfile(true).then(ok=>{ if(!ok){ state.armNext=false; state.awaitGen=null; } load(false); });
}

// ---- render --------------------------------------------------------------
function render(){
  if(!state.setupDone){ return renderPicker(); }
  const app = document.getElementById("app");
  const c = counts();
  const order = deskOrder();
  const total = order.reduce((n,k)=>n+(c[k]||0),0);
  const fixture = state.data && state.data.fixture;
  const report = state.data && state.data.report;
  const building = isBuilding(state.data);


  const cooldownNote = state.cooldown != null
    ? `Updating shortly — on cooldown${state.cooldown > 60 ? ` (~${Math.ceil(state.cooldown/60)} min)` : ""}.`
    : null;
  const interim = state.data && state.data.interim === "shared";
  const sumLine = cooldownNote ? cooldownNote
    : interim ? "Researching your personal wire — here's today's shared edition meanwhile…"
    : building ? "Building your briefing — researching every desk live. This can take several minutes…"
    : state.loading ? "Updating your briefing…"
    : total ? ""
    : "Nothing on the wire yet.";

  const filterBtns = [`<button class="fil ${state.filter==="all"?"on":""}" style="${state.filter==="all"?"background:var(--amber);border-color:var(--amber)":""}" data-filter="all">All <span class="cnt">${total}</span></button>`]
    .concat(order.map(k=>{
      const on = state.filter===k; const ac = cat(k).accent;
      return `<button class="fil ${on?"on":""}" draggable="true" data-deskpill="${esc(k)}" style="${on?`background:${ac};border-color:${ac}`:""}" data-filter="${esc(k)}">${esc(cat(k).label)} <span class="cnt">${c[k]||0}</span></button>`;
    })).join("");

  const items = visibleItems();
  let feedHtml = "";
  if(state.error){
    feedHtml = `<div class="empty"><div class="empty-h">Couldn’t load the briefing.</div>
      <p class="empty-p">${esc(state.error)}<br>If a desk timed out, hit refresh — it usually lands on the next go.</p>
      ${deskReport(report)}
      <button class="refresh" id="retry" style="margin-top:14px">Try again</button></div>`;
  } else if((state.loading||building) && !items.length){
    feedHtml = `<div class="skeletons">${"<div class='sk'></div>".repeat(4)}</div>`;
  } else if(items.length===0 && state.data && state.data.items && state.data.items.length){
    const rest = state.filter!=="all" ? baseItems().length : 0;
    feedHtml = `<div class="empty"><div class="empty-h">All caught up.</div>
      <p class="empty-p">${rest?`You’ve read everything on this desk.`:`You’ve read everything for now — more arrives with the next edition.`}</p>
      ${rest?`<button class="refresh" data-filter="all">Show all desks · ${rest} waiting</button>`:""}</div>`;
  } else if(items.length===0){
    feedHtml = `<div class="empty"><div class="empty-h">Nothing here yet.</div>
      <p class="empty-p">${esc(sumLine)}</p>${deskReport(report)}</div>`;
  } else {
    feedHtml = items.map(it=>{
      const info = cat(it.category); const ac = info.accent;
      const dirCol = it.direction==="up"?"var(--up)":it.direction==="down"?"var(--down)":"var(--muted)";
      const arrow = it.direction==="up"?"▲":it.direction==="down"?"▼":"■";
      const safeHref = /^https?:\/\//i.test(String(it.url||"")) ? it.url : "";   // never anchor a javascript:/data: url
      const titleHtml = safeHref ? `<a href="${esc(safeHref)}" target="_blank" rel="noreferrer">${esc(it.title)}</a>` : esc(it.title);
      return `<article class="card" data-id="${esc(it.id)}" style="--ac:${ac}">
        <div class="sw like">✓ Read</div>
        <div class="sw nope">◂ Not for me</div>
        <div class="card-top">
          <span class="cat" style="color:${ac}">${esc(info.label)}</span>
          ${it.why?`<button class="why-i" type="button" aria-expanded="false" aria-label="Why it matters">why</button>`:""}
          ${isNew(it)?`<span class="new-pill">NEW</span>`:""}
        </div>
        <h3 class="h">${titleHtml}</h3>
        ${it.summary?`<p class="p">${esc(it.summary)}</p>`:""}
        ${it.why?`<div class="why-pop" hidden><b>Why it matters</b>${esc(it.why)}</div>`:""}
        <div class="card-foot">
          <button class="type" type="button" data-mute="${esc(it.contentType)}" title="Mute this story type">${esc(it.contentType)}</button>
          ${it.changePct?`<span class="move" style="color:${dirCol}">${arrow} ${esc(it.changePct)}</span>`:""}
          <span class="src">${esc(it.source || domainOf(it.url) || "—")}</span>
          ${it.addedAt?`<span class="src">${relAge(it.addedAt)}</span>`:""}
          <button class="listen" data-listen="${esc(it.id)}" type="button" aria-label="Listen to this">▶</button>
        </div>
      </article>`;
    }).join("");

    if(items.length > 2){
      feedHtml += `<div style="text-align:center;margin-top:2px"><button class="linkbtn" id="markall">Mark all ${items.length} as read</button></div>`;
    }

    if(report && order.some(k=>report[k] && report[k].status!=="ok")){
      feedHtml += `<details style="background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 14px">
        <summary style="cursor:pointer;font-size:12.5px;color:var(--muted)">Some desks came back quiet — see report</summary>
        ${deskReport(report)}</details>`;
    }
  }

  const settingsHtml = !state.showSettings ? "" : `
    <div class="settings">
      <div class="set-row"><span class="set-label">Desks</span><div class="set-body">
        ${allDesksOrdered().map(id=>deskRowHtml(id, BUILTIN_ORDER.includes(id))).join("")}
        <div class="hint">Each desk shows its personality and how it’s currently leaning, based on what you swipe. Toggle a desk on/off or remove a custom one — changes rebuild your briefing.</div>
        ${state.showAddDesk ? (state.auth.signedIn ? `
          <div class="dform">
            <input id="d-label" maxlength="40" placeholder="Desk name (e.g. Formula 1, AI research, Cycling)" />
            <textarea id="d-topic" maxlength="200" placeholder="What should this desk cover? Be specific — e.g. 'Formula 1: race results, driver moves, regulation and team news'"></textarea>
            <div class="row">
              <button class="minibtn" id="d-add">Add desk</button>
              <button class="linkbtn" id="d-cancel">Cancel</button>
            </div>
          </div>` : `
          <div class="dform">
            <div class="hint">Custom desks are designed and kept with your Apple account — sign in and they sync everywhere.</div>
            ${state.auth.enabled?`<a class="apple-btn" href="/auth/apple/login?u=${encodeURIComponent(state.uid)}"> Sign in with Apple</a>`:`<div class="hint">Sign-in isn’t configured on this deployment.</div>`}
            <div class="row"><button class="linkbtn" id="d-cancel">Cancel</button></div>
          </div>`) : `<div class="row" style="margin-top:10px"><button class="linkbtn" id="d-new">＋ New desk</button></div>`}
      </div></div>
      <div class="set-row"><span class="set-label">Muted types</span><div class="set-body"><div class="chips">
        ${mutedTypes().length===0?`<span class="set-empty">None muted. Keep swiping a kind of story left and it gets muted automatically.</span>`:""}
        ${mutedTypes().map(t=>`<button class="chip muted" data-restore="${esc(t)}">${esc(t)} ✕</button>`).join("")}
      </div></div></div>
      <div class="set-row"><span class="set-label">Podcast</span><div class="set-body">
        <div class="hint">Pick the show's style — tap ▶ for a taster. Your next episode is produced in that register.</div>
        ${Object.entries(SHOWS).map(([id,s])=>{
          const cur = state.profile.show || "briefing";
          return `<div class="row" style="align-items:center;gap:8px;margin-top:7px">
            <button class="chip ${cur===id?"":"off"}" data-show="${id}">${cur===id?"✓ ":""}${s.label}</button>
            <button class="listen" data-preview="${id}" type="button" aria-label="Preview ${s.label}">▶</button>
            <span class="hint" style="margin:0">${s.desc}</span>
          </div>`;
        }).join("")}
      </div></div>
      <div class="set-row"><span class="set-label">Tuning</span><div class="set-body">
        <div class="hint">Swipe a card right to mark it read, left for not-for-me. Your desks learn and the next pull is tailored to you.</div>
        <div class="row" style="margin-top:8px;align-items:center;gap:7px">
          <span class="hint" style="margin:0">Only stories from the last</span>
          <select class="mini-sel" id="freshwin">
            ${[["","desk defaults"],["24h","24 hours"],["48h","48 hours"],["1w","week"],["1m","month"]]
              .map(([v,l])=>`<option value="${v}" ${(state.profile.window||"")===v?"selected":""}>${l}</option>`).join("")}
          </select>
        </div>
        <div class="row" style="margin-top:8px"><button class="linkbtn" id="reset-learn">Reset what I’ve learned</button></div>
      </div></div>

function deskReport(report){
  if(!report) return "";
  // Never show a raw provider/billing message as a desk status (cached feeds may
  // still carry the old "credit balance…" text); collapse it to a neutral note.
  const cleanStat = s => /credit balance|billing|quota|insufficient|unauthor|rate.?limit|payment|too low|plans ?&/i.test(String(s||"")) ? "temporarily unavailable" : String(s||"");
  const rows = deskOrder().map(k=>{
    const r = report[k]; const info = cat(k); const ok = r && r.status==="ok";
    return `<div class="diag-row"><span class="diag-dot" style="background:${ok?info.accent:"var(--faint)"}"></span>
      <span class="diag-name">${esc(info.label)}</span>
      <span class="diag-stat" style="color:${ok?"var(--text)":"var(--down)"}">${r?(ok?r.n+" stories":esc(cleanStat(r.status))):"—"}</span></div>`;
  }).join("");
  return `<div class="diag"><div class="diag-h">Desk report</div>${rows}</div>`;
}
