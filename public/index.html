// ---- per-item "listen" audio (one shared player) -------------------------
let _audio=null, _audioId=null;
function syncListenUI(){
  document.querySelectorAll(".listen").forEach(b=>{
    const id=b.getAttribute("data-listen"); const active=_audio&&_audioId===id;
    const playing=!!(active&&!_audio.paused&&!_audio.ended);
    const loading=!!(active&&!_audio.paused&&_audio.readyState<3&&!_audio.ended);
    b.classList.toggle("playing",playing); b.classList.toggle("loading",loading);
    b.textContent = loading ? "…" : (playing ? "⏸" : "▶");
  });
}
// ~15s show-style taster — shares the single readout player so nothing overlaps.
function playPreview(id){
  const pid = "preview:"+id;
  if(_audio && _audioId===pid){ _audio.paused ? _audio.play() : _audio.pause(); syncListenUI(); return; }
  if(_audio){ try{ _audio.pause(); }catch(_){} }
  if(_pod && !_pod.paused){ try{ _pod.pause(); }catch(_){} syncPod(); }
  _audio = new Audio(`/api/style-preview?s=${encodeURIComponent(id)}`);
  _audioId = pid;
  ["playing","pause","ended","error","waiting","canplay","loadstart"].forEach(ev=> _audio.addEventListener(ev, syncListenUI));
  _audio.addEventListener("error", ()=>{
    state.toast={msg:"Couldn’t play the taster — it renders on first listen, try again in a few seconds."};
    clearTimeout(window.__tt); window.__tt=setTimeout(()=>{state.toast=null;render();},3500); render();
  });
  _audio.play().catch(()=> syncListenUI());
  syncListenUI();
}
function toggleListen(id){
  if(_audio && _audioId===id){ _audio.paused ? _audio.play() : _audio.pause(); syncListenUI(); return; }
  if(_audio){ try{ _audio.pause(); }catch(_){} }
  if(_pod && !_pod.paused){ try{ _pod.pause(); }catch(_){} syncPod(); }   // one player at a time
  _audio = new Audio(`/api/listen/${encodeURIComponent(id)}?u=${encodeURIComponent(state.uid)}`);
  _audioId = id;
  ["playing","pause","ended","error","waiting","canplay","loadstart"].forEach(ev=> _audio.addEventListener(ev, syncListenUI));
  _audio.addEventListener("error", ()=>{   // was silent: tap → spinner → back to ▶ with no explanation
    state.toast={msg:"Couldn’t play that one — the feed may have refreshed."};
    clearTimeout(window.__tt); window.__tt=setTimeout(()=>{state.toast=null;render();},3500); render();
  });
  _audio.play().catch(()=> syncListenUI());
  syncListenUI();
}

// ---- daily podcast player (one shared player) ----------------------------
// Plays a small playlist: branded intro sting, the episode, then the outro. The
// beats are SEPARATE audio (not baked into the episode) because they're stereo and
// the voices are mono; concatenating the two pitches the voice up in some players.
// The episode renders server-side (ElevenLabs) and caches in R2; it's usually
// pre-warmed on build, on a cold cache the GET renders (~40s) then streams.
let _pod=null, _podBusy=false, _podQ=[], _podI=0, _podGen=0;   // _podGen: cancellation token for the cold-render wait
function syncPod(){
  const b=document.getElementById("podplay"); if(!b) return;
  const playing=!!(_pod && !_pod.paused && !_pod.ended);
  const loading=_podBusy || !!(_pod && !_pod.paused && _pod.readyState<3 && !_pod.ended);
  b.classList.toggle("loading",loading);
  b.textContent = loading ? "…" : (playing ? "⏸" : "▶");
}
function podPlayNext(){
  if(_podI >= _podQ.length){ _pod=null; const s=document.getElementById("podsub"); if(s) s.textContent="The day's news, talked through"; syncPod(); return; }
  if(_audio && !_audio.paused){ try{ _audio.pause(); }catch(_){} syncListenUI(); }   // one player at a time
  const track=_podQ[_podI];
  _podBusy=false;
  _pod=new Audio(track.url);
  ["playing","pause","waiting","canplay"].forEach(ev=> _pod.addEventListener(ev, syncPod));
  _pod.addEventListener("playing", ()=>{ const s=document.getElementById("podsub"); if(s && track.sub) s.textContent=track.sub; });
  _pod.addEventListener("ended", ()=>{ _podI++; podPlayNext(); });
  _pod.addEventListener("error", ()=>{
    // Intro/outro are optional flourishes: if a beat fails, skip straight on.
    if(track.optional){ _podI++; podPlayNext(); return; }
    // The episode is essential, and a cold GET 503s for the length of a full
    // render (~40-60s). Poll the cheap meta probe until it reports ready (or
    // the ~90s budget runs out), re-attempting the audio at least every ~30s —
    // the old fixed 2×5s retry gave up long before a cold render could finish.
    const s=document.getElementById("podsub");
    if(track.polls==null) track.polls = 24;   // ~2 min budget — outlives a full render plus the failure-backoff lock
    if(track.polls <= 0){ _pod=null; _podBusy=false; if(s) s.textContent="Couldn't load the episode, try again shortly."; syncPod(); return; }
    if(s) s.textContent="Generating today's episode… (up to a minute)";
    _podBusy=true; syncPod();
    const gen = _podGen;   // a cancelling tap bumps _podGen and orphans this loop
    let burst = 6;
    const tick = ()=> setTimeout(async ()=>{
      if(gen !== _podGen) return;
      track.polls--; burst--;
      const m = await podMeta();
      if(gen !== _podGen) return;
      if((m && m.ready) || burst <= 0 || track.polls <= 0){ _podBusy=false; podPlayNext(); }
      else tick();
    }, 5000);
    tick();
  });
  _pod.play().catch(()=> syncPod());
  syncPod();
}
const podMeta=()=> fetch("/api/podcast/today?meta=1").then(r=>r.json()).catch(()=>null);
async function podToggle(){
  if(_podBusy){ // tap during the cold-render wait = cancel; don't auto-play a minute later
    _podGen++; _podBusy=false; _pod=null; _podQ=[];
    const s=document.getElementById("podsub"); if(s) s.textContent="The day's news, talked through";
    syncPod(); return;
  }
  if(_pod){ _pod.paused ? _pod.play() : _pod.pause(); syncPod(); return; }
  const sub=document.getElementById("podsub");
  _podBusy=true; syncPod();
  const gen=_podGen;
  const m=await podMeta();
  if(gen!==_podGen) return;   // cancelled while we probed — don't rebuild the queue and play anyway
  if(!m || !m.turns){ if(sub) sub.textContent="Built with the next refresh."; _podBusy=false; syncPod(); return; }
  if(!m.ready && sub) sub.textContent="Generating today's episode… (up to a minute)";
  _podQ=[
    { url:"/api/beat?k=intro", optional:true },
    { url:"/api/podcast/today", optional:false, sub:"The day's news, talked through" },
    { url:"/api/beat?k=outro", optional:true },
  ];
  _podI=0; _podBusy=false; podPlayNext();
}

// ---- event wiring (incl. swipe gestures) ---------------------------------
function wire(){
  const $ = s => document.getElementById(s);
  $("theme") && ($("theme").onclick = toggleTheme);
  $("cog") && ($("cog").onclick = ()=>{ state.showSettings=!state.showSettings; if(!state.showSettings) state.showAddDesk=false; render(); });
  $("refresh") && ($("refresh").onclick = ()=>{ if(refreshLockMsLeft()>0) return; load(true); });
  $("retry") && ($("retry").onclick = ()=> load(true));
  // While the refresh lock is active, re-render once it expires so the button
  // flips back to "Refresh" (no per-second tick — the label is static).
  clearTimeout(window.__rlt);
  { const left = refreshLockMsLeft(); if(left>0) window.__rlt = setTimeout(render, left + 200); }
  $("undo") && ($("undo").onclick = ()=> undo());
  $("d-new") && ($("d-new").onclick = ()=>{ state.showAddDesk=true; render(); });
  $("d-cancel") && ($("d-cancel").onclick = ()=>{ state.showAddDesk=false; render(); });
  $("d-add") && ($("d-add").onclick = ()=> addCustomDesk(($("d-label")||{}).value, ($("d-topic")||{}).value, ""));
  $("reset-learn") && ($("reset-learn").onclick = ()=>{ state.profile.weights={}; saveProfile(); putProfile(false); state.toast={msg:"Cleared learned preferences"}; clearTimeout(window.__tt); window.__tt=setTimeout(()=>{state.toast=null;render();},3000); render(); });
  $("signout") && ($("signout").onclick = ()=>{ location.href="/auth/apple/logout"; });

  document.querySelectorAll("[data-filter]").forEach(b=> b.onclick = ()=>{ state.filter=b.dataset.filter; render(); });
  // Drag-to-reorder filter pills (desktop; touch uses the ▲▼ in Settings).
  document.querySelectorAll("[data-deskpill]").forEach(p=>{
    p.addEventListener("dragstart", (e)=>{ _dragDesk = p.dataset.deskpill; e.dataTransfer.effectAllowed="move"; try{ e.dataTransfer.setData("text/plain", _dragDesk); }catch(_){} p.classList.add("dragging"); });
    p.addEventListener("dragend", ()=>{ _dragDesk=null; document.querySelectorAll(".fil").forEach(f=>f.classList.remove("dragging","drop-target")); });
    p.addEventListener("dragover", (e)=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; p.classList.add("drop-target"); });
    p.addEventListener("dragleave", ()=> p.classList.remove("drop-target"));
    p.addEventListener("drop", (e)=>{ e.preventDefault(); reorderDesks(_dragDesk, p.dataset.deskpill); });
  });
  document.querySelectorAll("[data-mute]").forEach(b=> b.onclick = (e)=>{ e.stopPropagation(); muteType(b.dataset.mute); });
  document.querySelectorAll("[data-toggle]").forEach(b=> b.onclick = ()=> toggleBuiltin(b.dataset.toggle));
  document.querySelectorAll("[data-remove]").forEach(b=> b.onclick = ()=> removeCustomDesk(b.dataset.remove));
  document.querySelectorAll(".desk-note").forEach(el=> el.onchange = ()=> setDeskNote(el.getAttribute("data-note"), el.value));
  document.querySelectorAll(".desk-style").forEach(el=> el.onchange = ()=> setDeskStyle(el.getAttribute("data-style"), el.value));
  $("freshwin") && ($("freshwin").onchange = ()=> setFreshWindow($("freshwin").value));
  document.querySelectorAll("[data-show]").forEach(b=> b.onclick = ()=> setShowStyle(b.dataset.show));
  document.querySelectorAll("[data-preview]").forEach(b=> b.onclick = (e)=>{ e.stopPropagation(); playPreview(b.dataset.preview); });
  document.querySelectorAll("[data-up]").forEach(b=> b.onclick = ()=> moveDesk(b.dataset.up, -1));
  document.querySelectorAll("[data-down]").forEach(b=> b.onclick = ()=> moveDesk(b.dataset.down, 1));
  document.querySelectorAll(".why-i").forEach(b=> b.onclick = (e)=>{
    e.stopPropagation();
    const card = b.closest(".card"); const pop = card && card.querySelector(".why-pop"); if(!pop) return;
    const open = pop.hasAttribute("hidden");
    if(open) pop.removeAttribute("hidden"); else pop.setAttribute("hidden","");
    b.setAttribute("aria-expanded", open ? "true" : "false");
  });
  document.querySelectorAll(".listen[data-listen]").forEach(b=> b.onclick = (e)=>{ e.stopPropagation(); toggleListen(b.getAttribute("data-listen")); });   // [data-listen] only — the style-taster ▶s share the class but bind to playPreview
  syncListenUI();
  const rtipX=document.getElementById("rtip-x");
  if(rtipX) rtipX.onclick=()=>{ try{ localStorage.setItem("jackwire:readertip","1"); }catch(_){} const t=document.getElementById("rtip"); if(t) t.remove(); };
  const pp=document.getElementById("podplay");
  if(pp){
    pp.onclick=podToggle; syncPod();
    // Readiness check on load (status only; the render is warmed on ingest and,
    // failing that, by the audio GET when someone taps play).
    if(!_pod && !_podBusy) podMeta().then(m=>{
      if(m && m.ready) window.__podReady = true;   // sticky: re-renders keep the ⬇ once the MP3 is cached
      const dl=document.getElementById("poddl");
      if(dl && window.__podReady) dl.style.display="inline-flex";
      const s=document.getElementById("podsub"); if(!s||_pod||_podBusy) return;
      s.textContent = (m&&m.ready) ? "Ready · the day's news, talked through" : (m&&m.turns ? "Tap play to listen" : "Built with the next refresh");
    });
  }
  document.querySelectorAll("[data-restore]").forEach(b=> b.onclick = ()=> restoreType(b.dataset.restore));
  $("markall") && ($("markall").onclick = ()=>{
    visibleItems().forEach(it=>{ state.read.add(it.id); addDismissed(it); });
    saveRead(); render();
  });

  // Record "seen" only when a card is actually on screen — items below the
  // fold stay unseen and survive to the next visit.
  if(window.__seenObs) window.__seenObs.disconnect();
  if("IntersectionObserver" in window){
    window.__seenObs = new IntersectionObserver(ents=>{
      const seen=[];
      for(const en of ents){
        if(!en.isIntersecting) continue;
        const it = state.data && state.data.items && state.data.items.find(x=>x.id===en.target.dataset.id);
        if(it) seen.push(it);
        window.__seenObs.unobserve(en.target);
      }
      if(seen.length) recordSeen(seen);
    }, { threshold: 0.6 });
    document.querySelectorAll(".card[data-id]").forEach(c=> window.__seenObs.observe(c));
  } else if(state.data && state.data.items){ recordSeen(visibleItems()); }

  document.querySelectorAll(".card[data-id], .card[data-onboard]").forEach(card=>{
    const id = card.dataset.id;
    const onboardCard = !!card.dataset.onboard;
    let sx=0, sy=0, dx=0, dragging=false, decided=false, horizontal=false;
    const like = card.querySelector(".sw.like"), nope = card.querySelector(".sw.nope");
    const reset = ()=>{ card.style.transform=""; if(like)like.style.opacity=0; if(nope)nope.style.opacity=0; };
    card.addEventListener("pointerdown", e=>{
      if(e.target.closest("a,button")) return;
      dragging=true; decided=false; horizontal=false; sx=e.clientX; sy=e.clientY; dx=0;
      try{ card.setPointerCapture(e.pointerId); }catch(_){}
      card.classList.add("dragging");
    });
    card.addEventListener("pointermove", e=>{
      if(!dragging) return;
      dx = e.clientX - sx; const dy = e.clientY - sy;
      if(!decided && (Math.abs(dx)>8 || Math.abs(dy)>8)){ decided=true; horizontal = Math.abs(dx) > Math.abs(dy); }
      if(decided && !horizontal){ dragging=false; card.classList.remove("dragging"); reset(); return; }
      if(decided && horizontal){
        card.style.transform = `translateX(${dx}px) rotate(${dx/45}deg)`;
        if(like) like.style.opacity = dx>0 ? Math.min(1, dx/120) : 0;
        if(nope) nope.style.opacity = dx<0 ? Math.min(1, -dx/120) : 0;
      }
    });
    const finish = ()=>{
      if(!dragging){ return; }
      dragging=false; card.classList.remove("dragging");
      const it = (!onboardCard && state.data && state.data.items) ? state.data.items.find(x=>x.id===id) : null;
      const committed = horizontal && Math.abs(dx)>120 && (onboardCard || it);
      if(committed){
        const dir = dx>0?1:-1;
        card.style.transform = `translateX(${dir*620}px) rotate(${dir*22}deg)`; card.style.opacity="0";
        setTimeout(()=>{ onboardCard ? dismissOnboard() : (dir>0 ? swipeRight(it) : swipeLeft(it)); }, 170);
      } else { reset(); }
    };
    card.addEventListener("pointerup", finish);
    card.addEventListener("pointercancel", ()=>{ dragging=false; card.classList.remove("dragging"); reset(); });
  });
}

// ---- dark / light theme -------------------------------------------------
function curTheme(){ try{ return localStorage.getItem("jackwire:theme")||"dark"; }catch(_){ return "dark"; } }
function applyTheme(t){ if(t==="light") document.body.setAttribute("data-theme","light"); else document.body.removeAttribute("data-theme"); }
function toggleTheme(){ const t = curTheme()==="dark"?"light":"dark"; try{ localStorage.setItem("jackwire:theme", t); }catch(_){} applyTheme(t); render(); }

async function init(){
  applyTheme(curTheme());
  render();
  // Catalogue and auth in parallel — a first-time visitor shouldn't wait on
  // /api/me before the picker can even start loading.
  const catP = state.setupDone ? null : loadCatalogue();
  await fetchMe();
  let adopted = false;
  if(state.auth.signedIn) adopted = await loadServerProfile();   // adopt the synced profile
  // First sign-in with local tuning but no server profile yet: carry the local
  // wire onto the account and start the personalised build now — previously
  // this waited silently for some later swipe to sync.
  if(state.auth.signedIn && !adopted && profileCustomised()){
    state.armNext = true;
    putProfile(true);
    state.toast = { msg:"Your desks and everything you've taught your wire are now on your account." };
    clearTimeout(window.__tt); window.__tt=setTimeout(()=>{state.toast=null;render();},5200);
  }
  // Anyone who already has a built/tuned wire skips onboarding (existing users).
  if(profileCustomised()) markSetupDone();
  if(!state.setupDone){
    render();                 // shows the picker's loading state
    if(catP) await catP;
    render();                 // shows the picker with pitches
    return;
  }
  render();
  load(false);
}
// Coming back to the tab/PWA after a while: quietly pull the latest edition
// (nothing refetched on foregrounding before, so the 1pm return read 8am news).
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState!=="visible" || !state.setupDone || state.loading) return;
  if(Date.now() - (window.__lastFetch||0) > 10*60*1000) load(false);
});
init();
</script>
</body>
</html>
