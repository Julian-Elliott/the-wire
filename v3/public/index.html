<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>The Wire</title>
<style>
  :root {
    --bg: #0e0f12; --panel: #16181d; --ink: #e8e6e1; --dim: #9a968e;
    --line: #262930; --accent: #d4a24e; --urgent: #c0564e; --saga: #5e8ca7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 22px 18px 14px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 26px; letter-spacing: .06em; font-weight: 700; }
  h1 .v3 { color: var(--accent); font-size: 13px; vertical-align: super; margin-left: 2px; }
  #stamp { color: var(--dim); font-size: 13px; }
  nav { padding: 10px 18px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid var(--line); }
  nav button {
    background: var(--panel); color: var(--dim); border: 1px solid var(--line);
    border-radius: 999px; padding: 4px 12px; font-size: 13px; cursor: pointer;
  }
  nav button.on { color: var(--ink); border-color: var(--accent); }
  main { max-width: 720px; margin: 0 auto; padding: 14px 14px 60px; }
  article {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin: 12px 0;
  }
  article.p3 { border-left: 3px solid var(--urgent); }
  .meta { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
  .desk { color: var(--accent); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
  .saga-badge { color: var(--saga); border: 1px solid var(--saga); border-radius: 4px; padding: 0 5px; font-size: 11px; }
  .rankwhy { color: var(--accent); font-size: 11px; opacity: 0.85; }
  h2 { margin: 6px 0 6px; font-size: 18px; line-height: 1.35; }
  h2 a { color: var(--ink); text-decoration: none; }
  h2 a:hover { text-decoration: underline; text-decoration-color: var(--accent); }
  p.summary { margin: 0 0 6px; color: #c9c6bf; }
  p.why { margin: 0; color: var(--dim); font-size: 14px; font-style: italic; }
  p.held { margin: 6px 0 0; color: var(--accent); font-size: 13px; font-style: italic; }
  blockquote { margin: 8px 0 0; padding-left: 10px; border-left: 2px solid var(--line); color: var(--dim); font-size: 14px; }
  #empty { text-align: center; color: var(--dim); padding: 70px 20px; }
  #empty .big { font-size: 20px; color: var(--ink); margin-bottom: 8px; }
  footer { text-align: center; color: var(--dim); font-size: 12px; padding: 20px; }
</style>
</head>
<body>
<header>
  <h1>THE WIRE<span class="v3">v3</span></h1>
  <span id="stamp">loading…</span>
  <span id="who" style="margin-left:auto;font-size:13px;color:var(--dim)"></span>
</header>
<nav id="desks"></nav>
<main id="feed"></main>
<footer>The Wire v3 — foundation build. Sign-in, personalisation and audio arrive as Phase 1 completes.</footer>
<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  let items = [];
  let deskFilter = null;
  let signedIn = false;
  let held = {}; // story_id -> "why demoted" note (trust UX, §5)

  async function loadDemotions() {
    try {
      const res = await fetch("/api/me/demotions");
      if (!res.ok) return;
      const data = await res.json();
      held = Object.fromEntries((data.demotions || []).map((d) => [d.story_id, d.reason]));
      renderFeed();
    } catch { /* notes are best-effort */ }
  }

  async function whoami() {
    try {
      const res = await fetch("/api/me");
      if (res.ok) {
        const me = await res.json();
        signedIn = true;
        $("who").innerHTML = `${esc(me.name || "signed in")} · <a href="#" id="alerts" title="Turn on urgent push alerts" style="color:var(--dim);text-decoration:none">🔔</a> · <a href="#" id="setarea" title="Set home area for local planning alerts" style="color:var(--dim);text-decoration:none">📍</a> · <a href="/auth/apple/logout" style="color:var(--dim)">sign out</a>`;
        $("setarea").addEventListener("click", setHomeArea);
        $("alerts").addEventListener("click", enablePush);
        loadDemotions();
      } else {
        $("who").innerHTML = '<a href="/auth/apple/login" style="color:var(--accent);text-decoration:none">Sign in with Apple</a>';
      }
    } catch { /* header stays quiet */ }
  }

  // Web Push opt-in: register the service worker, subscribe with the VAPID
  // public key, and store the subscription. Urgent interrupts then reach this
  // browser directly (personas' #2 — delivery beyond the operator).
  const b64urlToBytes = (s) => {
    const pad = "=".repeat((4 - (s.length % 4)) % 4);
    const bin = atob((s + pad).replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from(bin, (c) => c.charCodeAt(0));
  };
  async function enablePush(e) {
    if (e) e.preventDefault();
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      $("stamp").textContent = "this browser can't do push alerts"; return;
    }
    try {
      const perm = await Notification.requestPermission();
      if (perm !== "granted") { $("stamp").textContent = "alerts permission declined"; return; }
      const keyRes = await fetch("/api/push/vapid-public");
      const keyData = await keyRes.json();
      if (!keyData.ok) { $("stamp").textContent = "push not available yet"; return; }
      const reg = await navigator.serviceWorker.register("/sw.js");
      await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: b64urlToBytes(keyData.key),
      });
      const j = sub.toJSON();
      await fetch("/api/push/subscribe", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ endpoint: j.endpoint, keys: j.keys }),
      });
      $("stamp").textContent = "urgent alerts are on for this device 🔔";
    } catch { $("stamp").textContent = "couldn't turn on alerts"; }
  }

  // Home area for "planning app near home" triggers (server rounds to
  // ~110 m; §8 — the user supplies it explicitly, nothing is sensed).
  function setHomeArea(e) {
    e.preventDefault();
    if (!navigator.geolocation) { $("stamp").textContent = "no location support in this browser"; return; }
    $("stamp").textContent = "getting location…";
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const res = await fetch("/api/me/area", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        });
        const data = await res.json();
        $("stamp").textContent = data.ok
          ? "home area set — local planning alerts on"
          : "couldn't save home area";
      } catch { $("stamp").textContent = "couldn't save home area"; }
    }, () => { $("stamp").textContent = "location permission declined"; });
  }

  // Scorecard events (V3_IDEAS_PLAN): counts only, works signed-out, and a
  // failed beacon never affects the reader.
  let editionCounted = false;
  function sendEvent(event) {
    try {
      const body = JSON.stringify({ event });
      const ok = navigator.sendBeacon
        && navigator.sendBeacon("/api/event", new Blob([body], { type: "application/json" }));
      if (!ok) {
        fetch("/api/event", {
          method: "POST", body, keepalive: true,
          headers: { "content-type": "application/json" },
        }).catch(() => {});
      }
    } catch { /* telemetry, never load-bearing */ }
  }

  function markRead(item) {
    if (!signedIn) return;
    fetch("/api/read", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ url: item.url, desk: item.desk, title: item.title, state: "read" }),
    }).catch(() => {});
  }

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (ch) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

  const ago = (iso) => {
    const mins = Math.max(0, Math.round((Date.now() - Date.parse(iso)) / 60000));
    if (mins < 60) return mins + "m ago";
    const h = Math.round(mins / 60);
    return h < 24 ? h + "h ago" : Math.round(h / 24) + "d ago";
  };

  const host = (u) => { try { return new URL(u).hostname.replace(/^www\./, ""); } catch { return ""; } };
  // Defence in depth: only ever render http(s) links (ingest already gates
  // to public URLs, but the reader refuses javascript:/data: regardless).
  const safeUrl = (u) => (/^https?:\/\//i.test(String(u || "")) ? String(u) : "#");

  function renderDesks() {
    const desks = [...new Set(items.map((i) => i.desk))].sort();
    $("desks").innerHTML = ["<button data-d=\"\" class=\"" + (deskFilter ? "" : "on") + "\">all</button>"]
      .concat(desks.map((d) =>
        `<button data-d="${esc(d)}" class="${deskFilter === d ? "on" : ""}">${esc(d)}</button>`))
      .join("");
  }

  function renderFeed() {
    const list = deskFilter ? items.filter((i) => i.desk === deskFilter) : items;
    if (!list.length) {
      $("feed").innerHTML = `<div id="empty"><div class="big">The presses are warming up</div>
        The newsroom is live but no edition has landed yet.<br>Stories arrive with the next research run.</div>`;
      return;
    }
    $("feed").innerHTML = list.map((i) => `
      <article class="${i.priority === 3 ? "p3" : ""}">
        <div class="meta">
          <span class="desk">${esc(i.desk)}</span>
          ${i.saga ? '<span class="saga-badge">saga</span>' : ""}
          <span>${esc(host(i.url))}</span>
          <span>${esc(ago(i.addedAt))}</span>
          ${i.rankWhy ? `<span class="rankwhy" title="why you're seeing this">✦ ${esc(i.rankWhy)}</span>` : ""}
        </div>
        <h2><a href="${esc(safeUrl(i.url))}" target="_blank" rel="noopener noreferrer">${esc(i.title)}</a></h2>
        <p class="summary">${esc(i.summary)}</p>
        ${i.why ? `<p class="why">${esc(i.why)}</p>` : ""}
        ${held[i.id] ? `<p class="held">held back — ${esc(held[i.id])}</p>` : ""}
        ${i.quote ? `<blockquote>“${esc(i.quote)}”</blockquote>` : ""}
      </article>`).join("");
  }

  async function load() {
    try {
      const res = await fetch("/api/feed/latest?limit=100");
      const data = await res.json();
      items = data.items ?? [];
      const rankedNote = data.ranked ? " · ranked for you" : "";
      $("stamp").textContent = items.length
        ? `${items.length} stories · updated ${new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" })}${rankedNote}`
        : "no edition yet";
      renderDesks();
      renderFeed();
      if (!editionCounted && items.length) {
        editionCounted = true;
        sendEvent("edition_opened");
      }
    } catch {
      $("stamp").textContent = "offline — retrying";
    }
  }

  $("desks").addEventListener("click", (e) => {
    const b = e.target.closest("button");
    if (!b) return;
    deskFilter = b.dataset.d || null;
    renderDesks();
    renderFeed();
  });

  // Clicking through to a story marks it read in the server-side ledger.
  $("feed").addEventListener("click", (e) => {
    const a = e.target.closest("h2 a");
    if (!a) return;
    const item = items.find((i) => i.url === a.getAttribute("href"));
    if (item) markRead(item);
    sendEvent("linkout_opened");
  });

  whoami();
  load();
  setInterval(load, 5 * 60 * 1000);
})();
</script>
</body>
</html>
