<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>The Wire — your news</title>
<style>
  /* Original dark look restored (the sweep over-brightened + over-sized it).
     Kept the real a11y wins: focus, ARIA, semantics, plain copy. --dim is
     nudged one step lighter than the pre-sweep #9a968e purely for legibility. */
  :root {
    --bg: #0e0f12; --panel: #16181d; --ink: #e8e6e1; --dim: #a29e94;
    --line: #262930; --accent: #d4a24e; --urgent: #c0564e; --saga: #5e8ca7;
    --focus: #d4a24e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  /* Clear keyboard focus everywhere (dark theme hides the default outline). */
  a:focus-visible, button:focus-visible {
    outline: 3px solid var(--focus); outline-offset: 2px; border-radius: 6px;
  }
  .skip {
    position: absolute; left: -999px; top: 0; background: var(--accent); color: #000;
    padding: 10px 14px; border-radius: 0 0 8px 0; z-index: 10; font-weight: 600;
  }
  .skip:focus { left: 0; }
  header {
    padding: 20px 18px 14px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px 16px; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 26px; letter-spacing: .06em; font-weight: 700; }
  h1 .v3 { color: var(--accent); font-size: 13px; vertical-align: super; margin-left: 2px; }
  #stamp { color: var(--dim); font-size: 13px; }
  #account { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ctl {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 999px; padding: 5px 11px; font-size: 13px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px; text-decoration: none;
  }
  .ctl:hover { border-color: var(--accent); }
  main { max-width: 720px; margin: 0 auto; padding: 14px 14px 60px; }
  .feed-list { list-style: none; margin: 0; padding: 0; }
  article {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin: 12px 0;
  }
  article.p3 { border-left: 4px solid var(--urgent); }
  .meta { display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--dim); flex-wrap: wrap; }
  /* Desk recedes from a loud gold label to a quiet grey companion so the
     source can LEAD the meta line (source-first, Wave A #4). */
  .desk { color: var(--dim); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; font-size: 12px; }
  .badge { color: var(--saga); border: 1px solid var(--saga); border-radius: 4px; padding: 0 6px; font-size: 12px; }
  .badge.urgent { color: var(--urgent); border-color: var(--urgent); }
  /* Worth-knowing (Wave B want/need): a QUIET accent border — never the filled
     red Urgent style — plus a visible, load-bearing reason line (not hover-only). */
  .badge.wk { color: var(--accent); border-color: var(--accent); }
  .wkwhy { margin: 4px 0 0; color: var(--accent); font-size: 13px; }
  .dp-chips, .dp-catalog { display: flex; gap: 6px; flex-wrap: wrap; margin: 0 0 8px; }
  .dp-w.chip { border-color: var(--accent); color: var(--accent); }
  /* Provenance leads: the outlet name is the anchor; the mark is a small shape
     signal (colour is only ever a redundant scan cue). */
  .src { display: inline-flex; align-items: center; gap: 5px; }
  .src-name { color: var(--ink); font-weight: 600; font-size: 14px; }
  .src-mark { font-size: 8px; line-height: 1; color: var(--accent); }   /* news: gold ● */
  .src--civic   .src-mark { color: var(--saga); }                        /* official: blue ◆ */
  .src--weather .src-mark { color: var(--dim); }                         /* grey ● */
  .src--local   .src-mark { color: var(--dim); font-size: 11px; }        /* grey ⌖ (distinct shape) */
  .src-more { color: var(--dim); font-size: 12px; font-weight: 400; font-variant-numeric: tabular-nums; }
  /* The one filled badge that earns its keep: a public record is not journalism. */
  .badge.type { color: var(--saga); border-color: var(--saga); background: rgba(94, 140, 167, .12); }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }
  /* Quiet transparency: a small star; the reason is on hover/focus + for
     screen readers, not shouted as prose on every card. */
  .rankwhy { color: var(--dim); font-size: 12px; cursor: help; }
  .rankwhy:hover, .rankwhy:focus { color: var(--accent); }
  h2 { margin: 6px 0 6px; font-size: 18px; line-height: 1.35; }
  h2 a { color: var(--ink); text-decoration: none; }
  h2 a:hover { text-decoration: underline; text-decoration-color: var(--accent); }
  p.summary { margin: 0 0 6px; color: #c9c6bf; }
  p.why { margin: 0; color: var(--dim); font-size: 14px; }
  p.held { margin: 6px 0 0; color: var(--accent); font-size: 14px; }
  blockquote { margin: 8px 0 0; padding-left: 12px; border-left: 3px solid var(--line); color: var(--dim); font-size: 15px; }
  #empty { text-align: center; color: var(--dim); padding: 70px 20px; }
  #empty .big { font-size: 21px; color: var(--ink); margin-bottom: 8px; }
  #panel { max-width: 720px; margin: 0 auto; padding: 4px 14px 0; }
  #panel[hidden] { display: none; }
  .dp-title { background: var(--panel); border: 1px solid var(--line); border-bottom: none;
    border-radius: 10px 10px 0 0; padding: 12px 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .dp-body { background: var(--panel); border: 1px solid var(--line); border-radius: 0 0 10px 10px; padding: 8px 16px 14px; }
  .dp-sub { color: var(--dim); font-size: 13px; text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }
  .dp-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; gap: 10px; flex-wrap: wrap; }
  .dp-name { font-size: 15px; }
  .dp-weights { display: flex; gap: 6px; flex-wrap: wrap; }
  .dp-w { background: #0c0d10; color: var(--ink); border: 1px solid var(--line); border-radius: 6px;
    padding: 4px 10px; font-size: 13px; cursor: pointer; }
  .dp-w[aria-pressed="true"] { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .dp-add { color: var(--accent); border-color: var(--accent); }
  footer { text-align: center; color: var(--dim); font-size: 13px; padding: 20px; }
  /* 🔎 Search tier (Wave A #5): a temporary takeover of #feed, like Catch-up. */
  .srch { padding: 8px 0 40px; }
  .srch-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 0 0 6px; }
  .srch-input { flex: 1 1 240px; min-width: 0; background: #0c0d10; color: var(--ink);
    border: 1px solid var(--line); border-radius: 999px; padding: 9px 14px; font-size: 15px; }
  .srch-input::placeholder { color: var(--dim); }
  .srch-input:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; border-color: var(--accent); }
  .srch-actions { margin: 8px 0 0; }
  .srch-add { border-color: var(--accent); color: var(--accent); }
  /* Calm check-in survey (Wave A #7): slim, infrequent, one tap, dismissible. */
  .survey { max-width: 720px; margin: 12px auto 0; padding: 12px 16px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; }
  .survey-q { margin: 0 0 8px; color: var(--ink); font-size: 15px; }
  .survey-opts { display: flex; gap: 8px; flex-wrap: wrap; }
  .survey-skip { color: var(--dim); }
  /* First-run chooser (the feed IS the chooser). Chips reuse .dp-w, so the
     selected state is the accent FILL from .dp-w[aria-pressed="true"] — never
     colour alone — and the global :focus-visible ring already covers them. */
  .onb { padding: 8px 0 40px; }
  .onb-title { font-size: 22px; font-weight: 700; line-height: 1.3; margin: 8px 0 6px; color: var(--ink); }
  .onb-title:focus-visible { outline: 3px solid var(--focus); outline-offset: 3px; border-radius: 6px; }
  .onb-sub { color: var(--dim); font-size: 15px; margin: 0 0 14px; }
  .onb-chips { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; padding: 0; margin: 0 0 14px; }
  .onb-chips li { margin: 0; }
  .onb-chip { text-transform: capitalize; padding: 8px 14px; font-size: 14px; border-radius: 999px; }
  .onb-count { color: var(--accent); font-size: 14px; min-height: 1.4em; margin: 0 0 12px; }
  .onb-done { border-color: var(--accent); color: var(--accent); margin: 0 0 8px; }
  .onb-preview { margin-top: 6px; }
  @keyframes onbIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .onb-preview .onb-in { animation: onbIn .45s ease-out both; }
  @media (prefers-reduced-motion: reduce) { .onb-preview .onb-in { animation: none; } }
</style>
</head>
<body>
<a class="skip" href="#feed">Skip to the news</a>
<header>
  <h1>THE WIRE<span class="v3">v3</span></h1>
  <span id="stamp" role="status" aria-live="polite">Loading…</span>
  <div id="account" aria-label="Your account"></div>
</header>
<!-- No read-time topic filter here by design. The feed is already narrowed
     twice before it reaches the eye: your follows filter it server-side, then
     desk-weight x salience x recency x trait-affinity rank what survives. A
     finite edition is dozens of cards, not thousands, so a per-desk pill row
     solved an infinite-scroll problem this product designed away and re-posed
     the "which topic?" question the pipeline just answered. Durable topic
     control lives in the on-demand "Topics" follow-picker below. If telemetry
     ever proves a real need for momentary single-topic reads, the sanctioned
     re-entry is ONE quiet auto-suppressed toggle (never an always-on row):
     hidden below 2 desks, any active filter always shown as an accented
     indicator, and the filter nulled whenever its control is absent. -->
<section id="panel" aria-label="Choose the topics you follow" tabindex="-1" hidden></section>
<main id="feed" aria-label="News stories"></main>
<footer>The Wire — your own news, chosen for you. New stories arrive a few times a day.</footer>
<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  let items = [];
  let currentItems = []; // whatever is rendered in #feed now (full feed or catch-up)
  let signedIn = false;
  let held = {}; // story_id -> "why held back" note (trust UX, §5)
  // Search-to-desk (Wave A #5): a temporary tier in #feed, like Catch-up.
  let searchDebounce = null, searchSeq = 0, searchActive = false, searchAbort = null;

  // First-run: the feed IS the chooser (PRODUCT_DIRECTION Wave A #3). A brand-
  // new user lands on tappable topic chips where the stream would be; each tap
  // follows a desk server-side and their feed materialises live below the chips.
  let onboardingActive = false;
  let chosen = {};            // desk -> 1, optimistic mirror of follows during first-run
  let available = [];         // desks offered as chips
  let prevPreviewIds = new Set();
  let previewTimer = null, pendingAdded = "";
  const DESK_LABELS = { world: "World", uk: "UK", politics: "Politics", business: "Business",
    markets: "Markets", tech: "Technology", ev: "Electric vehicles", energy: "Energy",
    science: "Science", health: "Health", climate: "Climate", weather: "Weather",
    sport: "Sport", gaming: "Gaming", culture: "Culture", planning: "Near home" };
  const deskLabel = (id) => DESK_LABELS[id] || (String(id || "").charAt(0).toUpperCase() + String(id || "").slice(1));

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (ch) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

  // Announce a short status message (the region is aria-live, so screen
  // readers read it out). Plain language throughout.
  const say = (msg) => { $("stamp").textContent = msg; };

  async function loadDemotions() {
    try {
      const res = await fetch("/api/me/demotions");
      if (!res.ok) return;
      const data = await res.json();
      held = Object.fromEntries((data.demotions || []).map((d) => [d.story_id, d.reason]));
      renderFeed();
    } catch { /* notes are best-effort */ }
  }

  function ctlButton(id, label, text) {
    return `<button type="button" class="ctl" id="${id}" aria-label="${esc(label)}">${esc(text)}</button>`;
  }

  async function whoami() {
    try {
      const res = await fetch("/api/me");
      if (res.ok) {
        const me = await res.json();
        signedIn = true;
        $("account").innerHTML =
          `<span aria-hidden="true" style="color:var(--dim);font-size:13px">${esc(me.name || "Signed in")}</span>` +
          ctlButton("catchupbtn", "Your finite catch-up edition", "☕ Catch-up") +
          ctlButton("searchbtn", "Search for news and add it to your feed", "🔎 Search") +
          ctlButton("desksbtn", "Choose the topics you follow", "⚙ Topics") +
          ctlButton("alerts", "Turn on urgent alerts for this device", "🔔 Alerts") +
          ctlButton("setarea", "Set your home area for local alerts", "📍 Area") +
          `<a class="ctl" href="/auth/apple/logout">Sign out</a>`;
        $("setarea").addEventListener("click", setHomeArea);
        $("alerts").addEventListener("click", enablePush);
        $("desksbtn").addEventListener("click", toggleDesks);
        $("catchupbtn").addEventListener("click", loadCatchup);
        $("searchbtn").addEventListener("click", openSearch);
        loadDemotions();
      } else {
        $("account").innerHTML = `<a class="ctl" href="/auth/apple/login" style="border-color:var(--accent);color:var(--accent)">Sign in with Apple</a>`;
      }
    } catch { /* header stays quiet */ }
  }

  // Catch-up: the edition that ENDS. A finite, capped set of what mattered
  // since you last caught up, closing with a clear "you're all caught up".
  let catchupNewest = null;
  async function loadCatchup(e) {
    if (e) e.preventDefault();
    // Opening Catch-up leaves the first-run chooser: clearing the flag re-arms
    // load() so this screen's "Browse the full feed" works — and because the
    // server still reports onboarding:true for a never-chose user, that load()
    // re-enters startOnboarding() and restores the chooser (never a dead-end).
    if (onboardingActive) { onboardingActive = false; clearTimeout(previewTimer); }
    say("Loading your catch-up…");
    try {
      const data = await (await fetch("/api/feed/catchup")).json();
      if (!data.ok) { say("Sign in to use catch-up."); return; }
      if (data.caughtUp) {
        catchupNewest = null;
        const since = data.since ? new Date(data.since).toLocaleString("en-GB", { weekday: "short", hour: "2-digit", minute: "2-digit" }) : null;
        $("feed").innerHTML = `<div id="empty"><p class="big">You're all caught up ✓</p>
          <p>${since ? "Nothing new since " + esc(since) + "." : "No stories yet."} Come back later — there's no more to scroll.</p>
          <p><button type="button" class="ctl" id="backfull" style="margin-top:10px">Browse the full feed</button></p></div>`;
        $("backfull").addEventListener("click", load);
        say("You're all caught up");
        return;
      }
      catchupNewest = data.items[0] ? data.items[0].addedAt : null;
      currentItems = data.items;
      const cards = data.items.map(renderCard).join("");
      const end = `<li><div id="empty" style="padding:34px 20px">
        <p class="big">That's your catch-up ✓</p>
        <p>${data.count} ${data.count === 1 ? "story" : "stories"} that mattered${data.remaining ? " · " + data.remaining + " more if you want them" : ""}. You're done — no infinite scroll here.</p>
        <p><button type="button" class="ctl" id="markdone" style="margin-top:10px;border-color:var(--accent);color:var(--accent)">Mark as done</button>
        <button type="button" class="ctl" id="backfull" style="margin-top:10px">Full feed</button></p></div></li>`;
      $("feed").innerHTML = `<ol class="feed-list">` + cards + end + `</ol>`;
      $("markdone").addEventListener("click", markCaughtUp);
      $("backfull").addEventListener("click", load);
      say(`Catch-up · ${data.count} ${data.count === 1 ? "story" : "stories"}`);
    } catch { say("Could not load catch-up. Please try again."); }
  }
  async function markCaughtUp() {
    try {
      await fetch("/api/feed/catchup/done", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ newestAt: catchupNewest }),
      });
      sendEvent("edition_finished"); // a calm win: you reached the end (scorecard, Wave A #7)
    } catch { /* still show the caught-up state */ }
    loadCatchup();
  }

  // ---- Search-to-desk (PRODUCT_DIRECTION Wave A #5) --------------------------
  // A temporary tier in #feed, cloned from the Catch-up takeover: live search
  // over your own feed; each result can be SAVED so its stories join the feed.
  function openSearch(e) {
    if (e) e.preventDefault();
    if (onboardingActive) { onboardingActive = false; clearTimeout(previewTimer); } // leave first-run cleanly
    // Close the Topics panel WITHOUT load() — closeDesks() would fire a feed
    // fetch that resolves later and clobbers the search takeover (verify fix).
    if (!$("panel").hidden) $("panel").hidden = true;
    searchActive = true;
    sendEvent("search_onboard_started");
    $("feed").innerHTML =
      '<section class="srch" aria-labelledby="srch-h">' +
        '<h2 id="srch-h" class="onb-title" tabindex="-1">Search the news</h2>' +
        '<p class="onb-sub">Find current stories on any topic. Save a search and its stories join your feed, just like following a topic.</p>' +
        '<form id="srchForm" role="search" class="srch-form">' +
          '<label class="sr-only" for="srchInput">Search for news</label>' +
          '<input id="srchInput" name="q" type="search" class="srch-input" autocomplete="off" maxlength="120" ' +
            'enterkeyhint="search" placeholder="e.g. flooding in Yorkshire, Tesla, interest rates">' +
          '<button type="button" class="ctl" id="srchBack">Back to feed</button>' +
        '</form>' +
        '<p id="srchStatus" class="onb-count" role="status" aria-live="polite">Type to search current stories.</p>' +
        '<ol id="srchResults" class="feed-list" aria-label="Search results"></ol>' +
      '</section>';
    $("srchForm").addEventListener("submit", (ev) => ev.preventDefault());
    $("srchBack").addEventListener("click", load); // load() clears searchActive + rebuilds
    const input = $("srchInput");
    input.addEventListener("input", () => { clearTimeout(searchDebounce); searchDebounce = setTimeout(runSearch, 250); });
    input.focus(); say("Search the news");
  }

  async function runSearch() {
    const input = $("srchInput"); if (!input) return;
    const q = input.value.trim(), results = $("srchResults"), status = $("srchStatus");
    if (q.length < 2) { if (results) results.innerHTML = ""; if (status) status.textContent = "Type to search current stories."; return; }
    if (searchAbort) searchAbort.abort(); // cancel the stale in-flight request
    searchAbort = new AbortController();
    const seq = ++searchSeq; status.textContent = "Searching…";
    let data;
    try { data = await (await fetch("/api/search?q=" + encodeURIComponent(q), { signal: searchAbort.signal })).json(); }
    catch (err) { if (err && err.name !== "AbortError") status.textContent = "Could not search right now. Please try again."; return; }
    if (seq !== searchSeq) return; // superseded by a newer keystroke (belt + braces)
    if (!data.ok) { status.textContent = "Sign in to search."; return; }
    const list = data.items || []; currentItems = list; // so result link-outs markRead + telemetry work
    if (!list.length) { results.innerHTML = ""; status.textContent = "No current stories match “" + q + "”. Try a broader word — or check back as new stories arrive."; return; }
    const echo = data.resolvedTo ? " · " + data.resolvedTo : ""; // entity echo (Wave A #6): Messi → Lionel Messi
    status.textContent = data.count + (data.count === 1 ? " story" : " stories") + " match “" + q + "”" + echo + (data.ai ? "" : " (matching by words)");
    results.innerHTML = list.map((i) => searchResultCard(i, q)).join("");
    results.querySelectorAll(".srch-add").forEach((b) => b.addEventListener("click", () => saveSearch(input.value.trim(), b)));
  }

  // Reuse the source-first card, inject one "Add to my feed" action.
  function searchResultCard(i, q) {
    const add = '<p class="srch-actions"><button type="button" class="ctl srch-add" ' +
      'aria-label="Save the search ' + esc(q) + ' and add its stories to your feed">＋ Add to my feed</button></p>';
    return renderCard(i).replace("</article></li>", add + "</article></li>");
  }

  async function saveSearch(q, btn) {
    if (!q || q.length < 2) return;
    if (btn) { btn.disabled = true; btn.textContent = "Adding…"; }
    let data;
    try { data = await (await fetch("/api/me/searches", { method: "POST",
      headers: { "content-type": "application/json" }, body: JSON.stringify({ q }) })).json(); }
    catch { if (btn) { btn.disabled = false; btn.textContent = "＋ Add to my feed"; } say("Could not save your search."); return; }
    const status = $("srchStatus");
    if (data.ok) {
      sendEvent("search_onboard_confirmed");
      if (btn) btn.textContent = "✓ Added to your feed";
      if (status) status.textContent = "“" + q + "” saved — its stories now join your feed. Manage saved searches in ⚙ Topics.";
    } else if (data.reason === "duplicate") {
      if (btn) { btn.disabled = false; btn.textContent = "✓ Already in your feed"; } // re-enable (verify fix)
    } else if (data.reason === "cap") {
      if (status) status.textContent = "You’ve reached the maximum saved searches. Remove one in ⚙ Topics first.";
      if (btn) { btn.disabled = false; btn.textContent = "＋ Add to my feed"; }
    } else if (btn) { btn.disabled = false; btn.textContent = "＋ Add to my feed"; }
  }

  // ---- First run: the feed IS the chooser (PRODUCT_DIRECTION Wave A #3) ------
  // Reached only when /api/feed/latest reports onboarding:true (never-chose).
  // Choosing and reading are the same continuous surface — no modal, no mode,
  // no default firehose. Every card the user sees traces to a tap they made.
  async function startOnboarding() {
    onboardingActive = true; signedIn = true;
    say("Choose a few topics to begin your feed");
    sendEvent("topic_onboard_started");
    let d;
    try { d = await (await fetch("/api/me/desks")).json(); }
    catch { onboardingActive = false; say("Cannot load topics right now. Please refresh."); return; }
    chosen = d.follows || {};
    available = (d.available || []).slice().sort();
    prevPreviewIds = new Set();
    renderChooser();
  }

  function renderChooser() {
    const has = available.length > 0;
    const chips = available.map((k) =>
      `<li><button type="button" class="dp-w onb-chip" aria-pressed="${chosen[k] !== undefined}" data-desk="${esc(k)}">${esc(deskLabel(k))}</button></li>`
    ).join("");
    $("feed").innerHTML =
      '<section class="onb" aria-labelledby="onb-h">' +
        '<h2 id="onb-h" class="onb-title" tabindex="-1">Choose a few topics to begin your feed</h2>' +
        '<p class="onb-sub">No defaults, nothing you didn’t choose. Tap a topic and your stream ' +
        'starts filling in below — tap as many as you like.</p>' +
        (has
          ? `<ul class="onb-chips" role="group" aria-label="Topics you can follow">${chips}</ul>`
          : '<p class="onb-sub">We’re gathering today’s topics — nothing to choose just yet. ' +
            'Start reading and pick topics any time from ⚙ Topics.</p>') +
        `<p id="onbCount" class="onb-count" role="status" aria-live="polite">${has ? "Pick a topic to start your feed." : " "}</p>` +
        `<button type="button" class="ctl onb-done" id="onbDone"${has ? " hidden" : ""}>${has ? "Start reading →" : "Continue →"}</button>` +
        '<ol id="onbPreview" class="feed-list onb-preview" aria-label="Your feed so far"></ol>' +
      '</section>';
    $("feed").querySelectorAll(".onb-chip").forEach((b) =>
      b.addEventListener("click", () => togglePick(b.dataset.desk)));
    $("onbDone").addEventListener("click", finishOnboarding);
  }

  async function togglePick(desk) {
    const following = chosen[desk] !== undefined;
    if (following) delete chosen[desk]; else chosen[desk] = 1; // optimistic
    reflectChips();
    if (available.length) { const done = $("onbDone"); if (done) done.hidden = Object.keys(chosen).length === 0; }
    pendingAdded = following ? pendingAdded : desk;
    try {
      await fetch("/api/me/desks", { method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ desk, weight: following ? 0 : 1 }) });
    } catch { /* the re-render reflects intent; the next tap reconciles */ }
    clearTimeout(previewTimer);
    previewTimer = setTimeout(previewTick, 200); // debounce the live-preview refetch
  }

  function reflectChips() {
    document.querySelectorAll(".onb-chip").forEach((b) =>
      b.setAttribute("aria-pressed", String(chosen[b.dataset.desk] !== undefined)));
  }

  async function previewTick() {
    const added = pendingAdded; pendingAdded = "";
    await refreshPreview();
    updateOnbStatus(added);
  }

  async function refreshPreview() {
    let list = [];
    try { list = (await (await fetch("/api/feed/latest?limit=100")).json()).items || []; } catch { return; }
    currentItems = list; // so preview link-outs markRead correctly
    const ol = $("onbPreview"); if (!ol) return;
    ol.innerHTML = list.map(renderCard).join("");
    Array.from(ol.children).forEach((li, i) => {
      const id = list[i] && list[i].id;
      if (id && !prevPreviewIds.has(id)) li.classList.add("onb-in"); // animate only genuinely new cards
    });
    prevPreviewIds = new Set(list.map((i) => i.id));
  }

  function updateOnbStatus(justAdded) {
    const n = Object.keys(chosen).length, s = currentItems.length;
    const el = $("onbCount"), done = $("onbDone");
    if (el) el.textContent = n === 0
      ? "Pick a topic to start your feed."
      : `${justAdded ? "“" + deskLabel(justAdded) + "” added — " : ""}${s} ${s === 1 ? "story" : "stories"} in your feed from ${n} ${n === 1 ? "topic" : "topics"}. Add more, or start reading.`;
    if (done && available.length) done.hidden = n === 0;
  }

  async function finishOnboarding() {
    sendEvent(Object.keys(chosen).length ? "topic_onboard_confirmed" : "topic_onboard_skipped");
    try { // stamp onboarded even at 0 picks so the chooser never reappears (respects "chose nothing")
      await fetch("/api/me/desks", { method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ onboarded: true }) });
    } catch { /* a real pick already flipped onboarded via its row; the marker is belt-and-suspenders */ }
    onboardingActive = false; clearTimeout(previewTimer);
    await load(); // now onboarding:false → the ordinary single ranked stream
    const link = $("feed").querySelector("h2 a"); // user-initiated → moving focus is expected
    if (link) link.focus();
    else { const t = $("desksbtn"); if (t) t.focus(); } // empty (urgent-only) feed → land on ⚙ Topics
  }

  // Reopening ⚙ Topics mid-chooser must not tear the chooser down (load() is
  // guarded off during onboarding); resync chips + preview from the panel edits.
  async function syncChooser() {
    try { const d = await (await fetch("/api/me/desks")).json();
      chosen = d.follows || {}; available = (d.available || []).slice().sort(); } catch { /* keep current */ }
    renderChooser(); await refreshPreview(); updateOnbStatus("");
  }

  // Follow-picker: choose which topics you follow and how strongly.
  const WEIGHT_LABELS = { 1: "Some", 2: "More", 3: "Lots" };
  function toggleDesks(e) {
    if (e) e.preventDefault();
    const panel = $("panel");
    if (!panel.hidden) { closeDesks(); return; }
    panel.hidden = false;
    renderDesksPanel();
    panel.focus(); // move keyboard focus into the panel
  }
  function closeDesks() {
    $("panel").hidden = true;
    const btn = $("desksbtn");
    if (btn) btn.focus(); // return focus to the button that opened it
    if (onboardingActive) { syncChooser(); return; } // keep the first-run chooser alive
    load();
  }
  async function renderDesksPanel() {
    const panel = $("panel");
    panel.innerHTML = '<div class="dp-title">Choose the topics you follow</div><div class="dp-body">Loading…</div>';
    try {
      const [d, scope, area] = await Promise.all([
        fetch("/api/me/desks").then((r) => r.json()),
        fetch("/api/me/scope").then((r) => r.json()),
        fetch("/api/me/area").then((r) => r.json()),
      ]);
      const follows = d.follows || {};
      const pitches = d.pitches || {};
      const searches = d.searches || []; // saved searches join the feed like desks (Wave A #5)
      const tags = scope.tags || []; // "Your world" anchors (Wave B want/need)
      const tagset = new Set(tags.map((t) => t.tag.toLowerCase()));
      const catalog = scope.catalog || []; const nudge = !!scope.nudge; const hasArea = !!(area && area.area);
      const followed = Object.keys(follows).sort();
      const notFollowed = (d.available || []).filter((x) => follows[x] === undefined).sort();
      const PITCH_LABELS = { 0: "Explain it", 1: "Normal", 2: "Insider" };
      const followRow = (desk) => {
        const lvl = pitches[desk] ?? 1;
        return `
        <div class="dp-row">
          <span class="dp-name">${esc(desk)}</span>
          <span class="dp-weights" role="group" aria-label="How much ${esc(desk)} news to show">
            ${[1, 2, 3].map((w) => `<button type="button" class="dp-w" aria-pressed="${follows[desk] === w}" data-desk="${esc(desk)}" data-w="${w}">${WEIGHT_LABELS[w]}</button>`).join("")}
            <button type="button" class="dp-w" data-desk="${esc(desk)}" data-w="0" aria-label="Stop following ${esc(desk)}">Unfollow</button>
          </span>
        </div>
        <div class="dp-row" style="padding-top:0">
          <span class="dp-name" style="font-size:13px;color:var(--dim)">↳ written for me:</span>
          <span class="dp-weights" role="group" aria-label="How ${esc(desk)} stories are written for me">
            ${[0, 1, 2].map((lv) => `<button type="button" class="dp-w" aria-pressed="${lvl === lv}" data-desk="${esc(desk)}" data-pitch="${lv}">${PITCH_LABELS[lv]}</button>`).join("")}
          </span>
        </div>`;
      };
      const addRow = (desk) => `
        <div class="dp-row">
          <span class="dp-name" style="color:var(--dim)">${esc(desk)}</span>
          <button type="button" class="dp-w dp-add" data-desk="${esc(desk)}" data-w="1" aria-label="Follow ${esc(desk)}">Follow</button>
        </div>`;
      const searchRow = (s) => `
        <div class="dp-row">
          <span class="dp-name">🔎 ${esc(s.q)}</span>
          <span class="dp-weights" role="group" aria-label="How much of the search ${esc(s.q)} to show">
            ${[1, 2, 3].map((w) => `<button type="button" class="dp-w" aria-pressed="${s.weight === w}" data-search="${esc(s.id)}" data-w="${w}">${WEIGHT_LABELS[w]}</button>`).join("")}
            <button type="button" class="dp-w" data-search="${esc(s.id)}" data-w="0" aria-label="Remove saved search ${esc(s.q)}">Remove</button>
          </span>
        </div>`;
      panel.innerHTML =
        '<div class="dp-title"><span>Choose the topics you follow</span><button type="button" class="ctl" id="dp-close">Done</button></div>' +
        '<div class="dp-body">' +
        (followed.length
          ? `<h2 class="dp-sub" style="margin-top:4px">Following</h2>${followed.map(followRow).join("")}`
          : '<p style="color:var(--dim);margin:8px 0">You’re only seeing urgent news right now. Pick the topics you want below and they’ll fill your feed.</p>') +
        (notFollowed.length ? `<h2 class="dp-sub">Add a topic</h2>${notFollowed.map(addRow).join("")}` : "") +
        (searches.length ? `<h2 class="dp-sub">Saved searches</h2>${searches.map(searchRow).join("")}` : "") +
        '<h2 class="dp-sub">Your world</h2>' +
        '<p style="color:var(--dim);font-size:13px;margin:0 0 8px">What actually bears on you — used only to mark a few stories “Worth knowing”. Places and organisations only — nothing about health or beliefs.</p>' +
        `<div class="dp-row"><span class="dp-name">📍 Home area${hasArea ? " ✓" : ""}</span><span class="dp-weights"><button type="button" class="dp-w dp-add" id="world-area">${hasArea ? "Update" : "Use my area"}</button>${hasArea ? '<button type="button" class="dp-w" id="world-area-clear">Clear</button>' : ""}</span></div>` +
        '<p style="color:var(--dim);font-size:12px;margin:0 0 8px">We keep only a ~110 m rounded point.</p>' +
        (tags.length ? `<div class="dp-chips">${tags.map((t) => `<button type="button" class="dp-w chip" data-removetag="${esc(t.tag)}" aria-label="Remove ${esc(t.tag)} from your world">${esc(t.tag)} ✕</button>`).join("")}</div>` : "") +
        `<div class="dp-catalog">${catalog.filter((c) => !tagset.has(String(c).toLowerCase())).map((c) => `<button type="button" class="dp-w" data-addtag="${esc(c)}" aria-label="Add ${esc(deskLabel(c))} to your world">+ ${esc(deskLabel(c))}</button>`).join("")}</div>` +
        '<div class="dp-row"><input class="srch-input" id="world-input" type="text" maxlength="40" placeholder="Add an employer, town or sector" aria-label="Add a place or organisation to your world"><button type="button" class="dp-w dp-add" id="world-add">Add</button></div>' +
        `<div class="dp-row"><span class="dp-name">🔔 Gentle nudges</span><button type="button" class="dp-w" id="world-nudge" aria-pressed="${nudge}">${nudge ? "On" : "Off"}</button></div>` +
        '<p style="color:var(--dim);font-size:12px;margin:0">At most once a day, only when you’re free. Off by default.</p>' +
        "</div>";
      $("dp-close").addEventListener("click", closeDesks);
      // Generic delegation is SCOPED to desk/search buttons only — the "Your
      // world" buttons below carry .dp-w too and must NOT fire this handler
      // (verify major: it would POST {desk:undefined} on every world click).
      panel.querySelectorAll("[data-desk],[data-search]").forEach((b) =>
        b.addEventListener("click", async () => {
          const isSearch = b.dataset.search !== undefined;
          const url = isSearch ? "/api/me/searches" : "/api/me/desks";
          const payload = isSearch
            ? { id: b.dataset.search, weight: Number(b.dataset.w) }
            : b.dataset.pitch !== undefined
              ? { desk: b.dataset.desk, pitch: Number(b.dataset.pitch) }
              : { desk: b.dataset.desk, weight: Number(b.dataset.w) };
          try {
            await fetch(url, {
              method: "POST", headers: { "content-type": "application/json" },
              body: JSON.stringify(payload),
            });
          } catch { /* re-render shows current state anyway */ }
          renderDesksPanel();
        }));
      // "Your world" wiring — dedicated handlers (not the generic delegation).
      const postScope = async (body) => {
        try { await fetch("/api/me/scope", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) }); } catch { /* re-render shows state */ }
        renderDesksPanel();
      };
      const wa = $("world-area"); if (wa) wa.addEventListener("click", (e) => setHomeArea(e));
      const wac = $("world-area-clear"); if (wac) wac.addEventListener("click", async () => {
        try { await fetch("/api/me/area", { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify({ lat: null, lon: null }) }); } catch { /* re-render */ }
        renderDesksPanel();
      });
      const wadd = $("world-add"); if (wadd) wadd.addEventListener("click", () => { const v = ($("world-input").value || "").trim(); if (v) postScope({ add: v }); });
      const wn = $("world-nudge"); if (wn) wn.addEventListener("click", () => postScope({ nudge: !nudge }));
      panel.querySelectorAll("[data-addtag]").forEach((b) => b.addEventListener("click", () => postScope({ add: b.dataset.addtag })));
      panel.querySelectorAll("[data-removetag]").forEach((b) => b.addEventListener("click", () => postScope({ remove: b.dataset.removetag })));
    } catch { panel.innerHTML = '<div class="dp-body">Could not load your topics. Please try again.</div>'; }
  }

  // Web Push opt-in.
  const b64urlToBytes = (s) => {
    const pad = "=".repeat((4 - (s.length % 4)) % 4);
    const bin = atob((s + pad).replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from(bin, (c) => c.charCodeAt(0));
  };
  async function enablePush(e) {
    if (e) e.preventDefault();
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      say("This browser cannot show alerts."); return;
    }
    try {
      const perm = await Notification.requestPermission();
      if (perm !== "granted") { say("Alerts are turned off. You can turn them on in your browser settings."); return; }
      const keyData = await (await fetch("/api/push/vapid-public")).json();
      if (!keyData.ok) { say("Alerts are not ready yet. Please try again later."); return; }
      const reg = await navigator.serviceWorker.register("/sw.js");
      await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true, applicationServerKey: b64urlToBytes(keyData.key),
      });
      const j = sub.toJSON();
      await fetch("/api/push/subscribe", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ endpoint: j.endpoint, keys: j.keys }),
      });
      say("Urgent alerts are on for this device.");
    } catch { say("Could not turn on alerts. Please try again."); }
  }

  // Home area for local "planning near home" alerts.
  function setHomeArea(e) {
    if (e) e.preventDefault();
    if (!navigator.geolocation) { say("This browser cannot find your location."); return; }
    say("Finding your location…");
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const data = await (await fetch("/api/me/area", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        })).json();
        say(data.ok ? "Home area saved. Local planning alerts are on." : "Could not save your home area.");
      } catch { say("Could not save your home area."); }
    }, () => { say("Location is turned off. You can turn it on in your browser settings."); });
  }

  // Anonymous engagement counts (no identifiers); never load-bearing.
  let editionCounted = false;
  let firstRelevantSent = false; // first meaningful engagement per session (scorecard, Wave A #7)
  function sendEvent(event) {
    try {
      const body = JSON.stringify({ event });
      const ok = navigator.sendBeacon
        && navigator.sendBeacon("/api/event", new Blob([body], { type: "application/json" }));
      if (!ok) fetch("/api/event", { method: "POST", body, keepalive: true, headers: { "content-type": "application/json" } }).catch(() => {});
    } catch { /* telemetry, never load-bearing */ }
  }

  function markRead(item) {
    if (!signedIn) return;
    fetch("/api/read", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ url: item.url, desk: item.desk, title: item.title, state: "read" }),
    }).catch(() => {});
  }

  const ago = (iso) => {
    const mins = Math.max(0, Math.round((Date.now() - Date.parse(iso)) / 60000));
    if (mins < 60) return mins + " min ago";
    const h = Math.round(mins / 60);
    return h < 24 ? h + " hours ago" : Math.round(h / 24) + " days ago";
  };
  const host = (u) => { try { return new URL(u).hostname.replace(/^www\./, ""); } catch { return ""; } };
  const safeUrl = (u) => (/^https?:\/\//i.test(String(u || "")) ? String(u) : "#");

  // ---- Provenance: source-first cards (PRODUCT_DIRECTION Wave A #4) ----------
  // "Where is this from?" leads every card. Curated outlet names DUAL-KEYED by
  // de-www'd host AND by the i.sources[0] feed id (so a civic story whose URL is
  // an off-site council portal still resolves), mirroring the DESK_LABELS
  // precedent — grows one row at a time, nothing server-side.
  const OUTLETS = {
    "bloomberg.com": "Bloomberg", "aljazeera.com": "Al Jazeera",
    "investing.com": "Investing.com", "fxstreet.com": "FXStreet",
    "ig.com": "IG", "skysports.com": "Sky Sports",
    "teamtalk.com": "TEAMtalk", "autoexpress.co.uk": "Auto Express",
    "gamedeveloper.com": "Game Developer", "nintendolife.com": "Nintendo Life",
    "planit.org.uk": "Planning register", "weather.apple.com": "Apple Weather",
    // feed ids (i.sources[0]) — resolve when the URL is a portal / synthetic
    "planit": "Planning register", "weather": "Apple Weather",
  };
  const CCSLD = new Set(["co.uk", "org.uk", "gov.uk", "ac.uk", "me.uk", "net.uk"]);
  const LOCAL_DESKS = new Set(["worcester"]); // genuine home-place editions only
  // NB: "liverpool" is a football-club TOPIC desk fed by national outlets
  // (Sky Sports, TEAMtalk…), NOT a local-place desk — it classifies as news.
  const CIVIC_FEEDS = new Set(["planit"]); // official registers
  // SR type word (a spoken text node) + the visual mark shape. Local gets a
  // distinct SHAPE (⌖), not just a colour, so local ≠ news without leaning on
  // colour (WCAG 1.4.1). Marks are aria-hidden decoration.
  const SRC_WORD = { news: "News outlet", civic: "Public record", weather: "Weather", local: "Local source" };
  const MARK = { news: "●", civic: "◆", weather: "●", local: "⌖" };

  function deriveOutlet(h) {
    const parts = h.split(".");
    let idx = parts.length - 2; // label before the TLD
    if (parts.length >= 3 && CCSLD.has(parts[parts.length - 2] + "." + parts[parts.length - 1])) {
      idx = parts.length - 3; // step past a 2-level ccSLD
    }
    if (idx < 0) idx = 0;
    return (parts[idx] || h).replace(/[-_]+/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
  }
  function outletName(i) {
    const h = host(i.url);
    if (h && OUTLETS[h]) return OUTLETS[h];
    const srcs = Array.isArray(i.sources) ? i.sources : [];
    const sid = srcs[0];
    if (sid && OUTLETS[sid]) return OUTLETS[sid]; // feed id BEFORE derivation
    if (h) return deriveOutlet(h);
    return "";
  }
  function sourceType(i) {
    const d = String(i.desk || "");
    const h = host(i.url);
    const srcs = Array.isArray(i.sources) ? i.sources : [];
    if (d === "weather") return "weather";
    // Exact/subdomain match only — a look-alike host (notplanit.org.uk) must
    // never earn the civic "Official record" trust badge.
    if (d === "planning" || srcs.some((s) => CIVIC_FEEDS.has(s)) || h === "planit.org.uk" || h.endsWith(".planit.org.uk")) return "civic";
    if (LOCAL_DESKS.has(d)) return "local";
    return "news";
  }
  function provenance(i) {
    const type = sourceType(i);
    let name = outletName(i);
    if (!name) name = type === "weather" ? "Apple Weather" : type === "civic" ? "Planning register" : "Unknown source";
    const srcs = Array.isArray(i.sources) ? i.sources : [];
    return { type, name, host: host(i.url), more: srcs.length > 1 ? srcs.length - 1 : 0 };
  }
  // The demoted desk companion is dropped only when the outlet name already
  // carries it as a WHOLE WORD ("Apple Weather" + Weather → once), so "Sport"
  // survives "Sky Sports" and "Worcester" survives "Worcesternews".
  function nameEchoesDesk(name, deskName) {
    if (!deskName) return false;
    const d = deskName.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    return new RegExp("\\b" + d + "\\b", "i").test(name);
  }

  // One story card — shared by the full feed, the Catch-up edition, AND the
  // first-run live preview. Provenance now LEADS the meta line.
  function renderCard(i) {
    const p = provenance(i);
    const deskName = deskLabel(i.desk);
    const showDesk = deskName && !nameEchoesDesk(p.name, deskName);
    return `
      <li><article class="${i.priority === 3 ? "p3" : ""}"${i.priority === 3 ? ' aria-label="Urgent"' : ""}>
        <p class="meta">
          <span class="src src--${esc(p.type)}"${p.host ? ` title="${esc(p.host)}"` : ""}>
            <span class="sr-only">${esc(SRC_WORD[p.type])}: </span>
            <span class="src-mark" aria-hidden="true">${MARK[p.type]}</span>
            <span class="src-name">${esc(p.name)}</span>
            ${p.more ? `<span class="src-more"><span aria-hidden="true">+${esc(p.more)} ${p.more === 1 ? "source" : "sources"}</span><span class="sr-only">, also carried by ${esc(p.more)} other ${p.more === 1 ? "source" : "sources"}</span></span>` : ""}
          </span>
          ${p.type === "civic" ? '<span class="badge type">Official record</span>' : ""}
          ${i.priority === 3 ? '<span class="badge urgent">Urgent</span>' : ""}
          ${i.worthKnowing ? '<span class="badge wk">Worth knowing</span>' : ""}
          ${i.saga ? '<span class="badge">Ongoing story</span>' : ""}
          ${i.searchQ ? `<span class="badge">🔎 ${esc(i.searchQ)}</span>` : ""}
          ${showDesk ? `<span class="desk">${esc(deskName)}</span>` : ""}
          <span>${esc(ago(i.addedAt))}</span>
          ${i.rankWhy ? `<span class="rankwhy" tabindex="0" title="Why you're seeing this: ${esc(i.rankWhy)}" aria-label="Why you're seeing this: ${esc(i.rankWhy)}">★</span>` : ""}
        </p>
        <h2><a href="${esc(safeUrl(i.url))}" target="_blank" rel="noopener noreferrer">${esc(i.title)}</a></h2>
        ${i.worthKnowing && i.needWhy ? `<p class="wkwhy">Worth knowing for you — ${esc(i.needWhy)}</p>` : ""}
        <p class="summary">${esc(i.summary)}</p>
        ${i.why ? `<p class="why">Why it matters: ${esc(i.why)}</p>` : ""}
        ${held[i.id] ? `<p class="held">${i.priority === 3 ? "Held back from an alert" : "Held back from a gentle nudge"} — ${esc(held[i.id])}${i.worthKnowing ? " · it's here in your Worth knowing" : ""}</p>` : ""}
        ${i.quote ? `<blockquote>“${esc(i.quote)}”</blockquote>` : ""}
      </article></li>`;
  }

  function renderFeed() {
    if (onboardingActive) return; // the inline first-run chooser owns #feed
    if (!items.length) {
      $("feed").innerHTML = `<div id="empty"><p class="big">No stories yet</p>
        <p>The newsroom is running. New stories arrive a few times a day — check back soon.</p></div>`;
      return;
    }
    $("feed").innerHTML = `<ol class="feed-list">` + items.map(renderCard).join("") + `</ol>`;
  }

  async function load() {
    searchActive = false; // the search tier's way back (Back-to-feed / Escape)
    if (onboardingActive) return; // don't clobber an in-progress chooser
    try {
      const data = await (await fetch("/api/feed/latest?limit=100")).json();
      // A search takeover opened while this fetch was in flight — don't clobber
      // it (neutralises the initial load / 5-min interval race; verify fix).
      if (searchActive) return;
      if (data.onboarding) { startOnboarding(); return; } // brand-new / never-chose → inline chooser
      items = data.items ?? [];
      currentItems = items;
      const when = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
      say(items.length
        ? `${items.length} stories${data.ranked ? ", chosen for you" : ""} · updated ${when}`
        : "No stories yet");
      renderFeed();
      if (!editionCounted && items.length) {
        editionCounted = true;
        sendEvent("edition_opened");
        maybeShowSurvey(); // once per session, throttled + gated inside
      }
    } catch {
      say("Cannot load right now. Trying again shortly.");
    }
  }

  // A slim, infrequent calm check-in (scorecard, Wave A #7). At most once a
  // week, only from the 3rd session on, one tap, fully dismissible — never
  // nags. Measures subjective calm; if there's no storage we simply never ask.
  const SURVEY_KEY = "wire_survey_at", SEEN_KEY = "wire_editions_seen";
  const SURVEY_COOLDOWN_MS = 7 * 24 * 60 * 60 * 1000;
  function maybeShowSurvey() {
    if (!signedIn || onboardingActive || $("survey")) return;
    let last = 0, seen = 0;
    try {
      last = Number(localStorage.getItem(SURVEY_KEY)) || 0;
      seen = (Number(localStorage.getItem(SEEN_KEY)) || 0) + 1;
      localStorage.setItem(SEEN_KEY, String(seen));
    } catch { return; } // no storage → never ask
    if (seen < 3 || Date.now() - last < SURVEY_COOLDOWN_MS) return;
    const bar = document.createElement("section");
    bar.id = "survey"; bar.className = "survey"; bar.setAttribute("aria-label", "A quick calm check-in");
    const opt = (a, label) => `<button type="button" class="ctl" data-a="${a}">${label}</button>`;
    bar.innerHTML =
      '<p class="survey-q">Is The Wire leaving you calmer than the news you had before?</p>' +
      '<div class="survey-opts" role="group" aria-label="Your answer">' +
      opt("calmer", "Calmer") + opt("same", "About the same") + opt("noisier", "Noisier") +
      '<button type="button" class="ctl survey-skip" data-a="skip">Not now</button></div>';
    $("feed").parentNode.insertBefore(bar, $("feed"));
    bar.querySelectorAll("button").forEach((b) => b.addEventListener("click", () => {
      const a = b.dataset.a;
      if (a === "calmer" || a === "same" || a === "noisier") sendEvent("survey_" + a);
      try { localStorage.setItem(SURVEY_KEY, String(Date.now())); } catch { /* best effort */ }
      bar.remove();
      if (a !== "skip") say("Thanks — that helps keep The Wire calm.");
    }));
  }

  // Escape closes the search tier or the topics panel (keyboard users).
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && searchActive) { load(); return; } // leave the search tier
    if (e.key === "Escape" && !$("panel").hidden) closeDesks();
  });

  $("feed").addEventListener("click", (e) => {
    const a = e.target.closest("h2 a");
    if (!a) return;
    const item = currentItems.find((i) => i.url === a.getAttribute("href"));
    if (item) markRead(item);
    sendEvent("linkout_opened");
    // The feed surfaced something worth opening — the relevance signal.
    if (!firstRelevantSent) { firstRelevantSent = true; sendEvent("first_relevant_story"); }
  });

  whoami();
  load();
  setInterval(() => { if (!searchActive) load(); }, 5 * 60 * 1000); // never clobber an open search
})();
</script>
</body>
</html>
