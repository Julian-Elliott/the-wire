<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>The Wire — your news</title>
<style>
  /* Original dark look restored (the sweep over-brightened + over-sized it).
     Kept the real a11y wins: focus, ARIA, semantics, plain copy. --dim is
     nudged one step lighter than the pre-sweep #9a968e purely for legibility. */
  :root {
    --bg: #0e0f12; --panel: #16181d; --ink: #e8e6e1; --dim: #a29e94;
    --line: #262930; --accent: #d4a24e; --urgent: #c0564e; --saga: #5e8ca7;
    --focus: #d4a24e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  /* Clear keyboard focus everywhere (dark theme hides the default outline). */
  a:focus-visible, button:focus-visible {
    outline: 3px solid var(--focus); outline-offset: 2px; border-radius: 6px;
  }
  .skip {
    position: absolute; left: -999px; top: 0; background: var(--accent); color: #000;
    padding: 10px 14px; border-radius: 0 0 8px 0; z-index: 10; font-weight: 600;
  }
  .skip:focus { left: 0; }
  header {
    padding: 20px 18px 14px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px 16px; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 26px; letter-spacing: .06em; font-weight: 700; }
  h1 .v3 { color: var(--accent); font-size: 13px; vertical-align: super; margin-left: 2px; }
  #stamp { color: var(--dim); font-size: 13px; }
  #account { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ctl {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 999px; padding: 5px 11px; font-size: 13px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px; text-decoration: none;
  }
  .ctl:hover { border-color: var(--accent); }
  main { max-width: 720px; margin: 0 auto; padding: 14px 14px 60px; }
  .feed-list { list-style: none; margin: 0; padding: 0; }
  article {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; margin: 12px 0;
  }
  article.p3 { border-left: 4px solid var(--urgent); }
  .meta { display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--dim); flex-wrap: wrap; }
  .desk { color: var(--accent); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
  .badge { color: var(--saga); border: 1px solid var(--saga); border-radius: 4px; padding: 0 6px; font-size: 12px; }
  .badge.urgent { color: var(--urgent); border-color: var(--urgent); }
  /* Quiet transparency: a small star; the reason is on hover/focus + for
     screen readers, not shouted as prose on every card. */
  .rankwhy { color: var(--dim); font-size: 12px; cursor: help; }
  .rankwhy:hover, .rankwhy:focus { color: var(--accent); }
  h2 { margin: 6px 0 6px; font-size: 18px; line-height: 1.35; }
  h2 a { color: var(--ink); text-decoration: none; }
  h2 a:hover { text-decoration: underline; text-decoration-color: var(--accent); }
  p.summary { margin: 0 0 6px; color: #c9c6bf; }
  p.why { margin: 0; color: var(--dim); font-size: 14px; }
  p.held { margin: 6px 0 0; color: var(--accent); font-size: 14px; }
  blockquote { margin: 8px 0 0; padding-left: 12px; border-left: 3px solid var(--line); color: var(--dim); font-size: 15px; }
  #empty { text-align: center; color: var(--dim); padding: 70px 20px; }
  #empty .big { font-size: 21px; color: var(--ink); margin-bottom: 8px; }
  #panel { max-width: 720px; margin: 0 auto; padding: 4px 14px 0; }
  #panel[hidden] { display: none; }
  .dp-title { background: var(--panel); border: 1px solid var(--line); border-bottom: none;
    border-radius: 10px 10px 0 0; padding: 12px 16px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .dp-body { background: var(--panel); border: 1px solid var(--line); border-radius: 0 0 10px 10px; padding: 8px 16px 14px; }
  .dp-sub { color: var(--dim); font-size: 13px; text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }
  .dp-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; gap: 10px; flex-wrap: wrap; }
  .dp-name { font-size: 15px; }
  .dp-weights { display: flex; gap: 6px; flex-wrap: wrap; }
  .dp-w { background: #0c0d10; color: var(--ink); border: 1px solid var(--line); border-radius: 6px;
    padding: 4px 10px; font-size: 13px; cursor: pointer; }
  .dp-w[aria-pressed="true"] { color: var(--bg); background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .dp-add { color: var(--accent); border-color: var(--accent); }
  footer { text-align: center; color: var(--dim); font-size: 13px; padding: 20px; }
</style>
</head>
<body>
<a class="skip" href="#feed">Skip to the news</a>
<header>
  <h1>THE WIRE<span class="v3">v3</span></h1>
  <span id="stamp" role="status" aria-live="polite">Loading…</span>
  <div id="account" aria-label="Your account"></div>
</header>
<!-- No read-time topic filter here by design. The feed is already narrowed
     twice before it reaches the eye: your follows filter it server-side, then
     desk-weight x salience x recency x trait-affinity rank what survives. A
     finite edition is dozens of cards, not thousands, so a per-desk pill row
     solved an infinite-scroll problem this product designed away and re-posed
     the "which topic?" question the pipeline just answered. Durable topic
     control lives in the on-demand "Topics" follow-picker below. If telemetry
     ever proves a real need for momentary single-topic reads, the sanctioned
     re-entry is ONE quiet auto-suppressed toggle (never an always-on row):
     hidden below 2 desks, any active filter always shown as an accented
     indicator, and the filter nulled whenever its control is absent. -->
<section id="panel" aria-label="Choose the topics you follow" tabindex="-1" hidden></section>
<main id="feed" aria-label="News stories"></main>
<footer>The Wire — your own news, chosen for you. New stories arrive a few times a day.</footer>
<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  let items = [];
  let currentItems = []; // whatever is rendered in #feed now (full feed or catch-up)
  let signedIn = false;
  let held = {}; // story_id -> "why held back" note (trust UX, §5)

  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (ch) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));

  // Announce a short status message (the region is aria-live, so screen
  // readers read it out). Plain language throughout.
  const say = (msg) => { $("stamp").textContent = msg; };

  async function loadDemotions() {
    try {
      const res = await fetch("/api/me/demotions");
      if (!res.ok) return;
      const data = await res.json();
      held = Object.fromEntries((data.demotions || []).map((d) => [d.story_id, d.reason]));
      renderFeed();
    } catch { /* notes are best-effort */ }
  }

  function ctlButton(id, label, text) {
    return `<button type="button" class="ctl" id="${id}" aria-label="${esc(label)}">${esc(text)}</button>`;
  }

  async function whoami() {
    try {
      const res = await fetch("/api/me");
      if (res.ok) {
        const me = await res.json();
        signedIn = true;
        $("account").innerHTML =
          `<span aria-hidden="true" style="color:var(--dim);font-size:13px">${esc(me.name || "Signed in")}</span>` +
          ctlButton("catchupbtn", "Your finite catch-up edition", "☕ Catch-up") +
          ctlButton("desksbtn", "Choose the topics you follow", "⚙ Topics") +
          ctlButton("alerts", "Turn on urgent alerts for this device", "🔔 Alerts") +
          ctlButton("setarea", "Set your home area for local alerts", "📍 Area") +
          `<a class="ctl" href="/auth/apple/logout">Sign out</a>`;
        $("setarea").addEventListener("click", setHomeArea);
        $("alerts").addEventListener("click", enablePush);
        $("desksbtn").addEventListener("click", toggleDesks);
        $("catchupbtn").addEventListener("click", loadCatchup);
        loadDemotions();
      } else {
        $("account").innerHTML = `<a class="ctl" href="/auth/apple/login" style="border-color:var(--accent);color:var(--accent)">Sign in with Apple</a>`;
      }
    } catch { /* header stays quiet */ }
  }

  // Catch-up: the edition that ENDS. A finite, capped set of what mattered
  // since you last caught up, closing with a clear "you're all caught up".
  let catchupNewest = null;
  async function loadCatchup(e) {
    if (e) e.preventDefault();
    say("Loading your catch-up…");
    try {
      const data = await (await fetch("/api/feed/catchup")).json();
      if (!data.ok) { say("Sign in to use catch-up."); return; }
      if (data.caughtUp) {
        catchupNewest = null;
        const since = data.since ? new Date(data.since).toLocaleString("en-GB", { weekday: "short", hour: "2-digit", minute: "2-digit" }) : null;
        $("feed").innerHTML = `<div id="empty"><p class="big">You're all caught up ✓</p>
          <p>${since ? "Nothing new since " + esc(since) + "." : "No stories yet."} Come back later — there's no more to scroll.</p>
          <p><button type="button" class="ctl" id="backfull" style="margin-top:10px">Browse the full feed</button></p></div>`;
        $("backfull").addEventListener("click", load);
        say("You're all caught up");
        return;
      }
      catchupNewest = data.items[0] ? data.items[0].addedAt : null;
      currentItems = data.items;
      const cards = data.items.map(renderCard).join("");
      const end = `<li><div id="empty" style="padding:34px 20px">
        <p class="big">That's your catch-up ✓</p>
        <p>${data.count} ${data.count === 1 ? "story" : "stories"} that mattered${data.remaining ? " · " + data.remaining + " more if you want them" : ""}. You're done — no infinite scroll here.</p>
        <p><button type="button" class="ctl" id="markdone" style="margin-top:10px;border-color:var(--accent);color:var(--accent)">Mark as done</button>
        <button type="button" class="ctl" id="backfull" style="margin-top:10px">Full feed</button></p></div></li>`;
      $("feed").innerHTML = `<ol class="feed-list">` + cards + end + `</ol>`;
      $("markdone").addEventListener("click", markCaughtUp);
      $("backfull").addEventListener("click", load);
      say(`Catch-up · ${data.count} ${data.count === 1 ? "story" : "stories"}`);
    } catch { say("Could not load catch-up. Please try again."); }
  }
  async function markCaughtUp() {
    try {
      await fetch("/api/feed/catchup/done", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ newestAt: catchupNewest }),
      });
    } catch { /* still show the caught-up state */ }
    loadCatchup();
  }

  // Follow-picker: choose which topics you follow and how strongly.
  const WEIGHT_LABELS = { 1: "Some", 2: "More", 3: "Lots" };
  function toggleDesks(e) {
    if (e) e.preventDefault();
    const panel = $("panel");
    if (!panel.hidden) { closeDesks(); return; }
    panel.hidden = false;
    renderDesksPanel();
    panel.focus(); // move keyboard focus into the panel
  }
  function closeDesks() {
    $("panel").hidden = true;
    const btn = $("desksbtn");
    if (btn) btn.focus(); // return focus to the button that opened it
    load();
  }
  async function renderDesksPanel() {
    const panel = $("panel");
    panel.innerHTML = '<div class="dp-title">Choose the topics you follow</div><div class="dp-body">Loading…</div>';
    try {
      const res = await fetch("/api/me/desks");
      const d = await res.json();
      const follows = d.follows || {};
      const pitches = d.pitches || {};
      const followed = Object.keys(follows).sort();
      const notFollowed = (d.available || []).filter((x) => follows[x] === undefined).sort();
      const PITCH_LABELS = { 0: "Explain it", 1: "Normal", 2: "Insider" };
      const followRow = (desk) => {
        const lvl = pitches[desk] ?? 1;
        return `
        <div class="dp-row">
          <span class="dp-name">${esc(desk)}</span>
          <span class="dp-weights" role="group" aria-label="How much ${esc(desk)} news to show">
            ${[1, 2, 3].map((w) => `<button type="button" class="dp-w" aria-pressed="${follows[desk] === w}" data-desk="${esc(desk)}" data-w="${w}">${WEIGHT_LABELS[w]}</button>`).join("")}
            <button type="button" class="dp-w" data-desk="${esc(desk)}" data-w="0" aria-label="Stop following ${esc(desk)}">Unfollow</button>
          </span>
        </div>
        <div class="dp-row" style="padding-top:0">
          <span class="dp-name" style="font-size:13px;color:var(--dim)">↳ written for me:</span>
          <span class="dp-weights" role="group" aria-label="How ${esc(desk)} stories are written for me">
            ${[0, 1, 2].map((lv) => `<button type="button" class="dp-w" aria-pressed="${lvl === lv}" data-desk="${esc(desk)}" data-pitch="${lv}">${PITCH_LABELS[lv]}</button>`).join("")}
          </span>
        </div>`;
      };
      const addRow = (desk) => `
        <div class="dp-row">
          <span class="dp-name" style="color:var(--dim)">${esc(desk)}</span>
          <button type="button" class="dp-w dp-add" data-desk="${esc(desk)}" data-w="1" aria-label="Follow ${esc(desk)}">Follow</button>
        </div>`;
      panel.innerHTML =
        '<div class="dp-title"><span>Choose the topics you follow</span><button type="button" class="ctl" id="dp-close">Done</button></div>' +
        '<div class="dp-body">' +
        (followed.length
          ? `<h2 class="dp-sub" style="margin-top:4px">Following</h2>${followed.map(followRow).join("")}`
          : '<p style="color:var(--dim);margin:8px 0">Right now you see every topic. Pick the ones you want below to focus your news.</p>') +
        (notFollowed.length ? `<h2 class="dp-sub">Add a topic</h2>${notFollowed.map(addRow).join("")}` : "") +
        "</div>";
      $("dp-close").addEventListener("click", closeDesks);
      panel.querySelectorAll(".dp-w").forEach((b) =>
        b.addEventListener("click", async () => {
          const payload = b.dataset.pitch !== undefined
            ? { desk: b.dataset.desk, pitch: Number(b.dataset.pitch) }
            : { desk: b.dataset.desk, weight: Number(b.dataset.w) };
          try {
            await fetch("/api/me/desks", {
              method: "POST", headers: { "content-type": "application/json" },
              body: JSON.stringify(payload),
            });
          } catch { /* re-render shows current state anyway */ }
          renderDesksPanel();
        }));
    } catch { panel.innerHTML = '<div class="dp-body">Could not load your topics. Please try again.</div>'; }
  }

  // Web Push opt-in.
  const b64urlToBytes = (s) => {
    const pad = "=".repeat((4 - (s.length % 4)) % 4);
    const bin = atob((s + pad).replace(/-/g, "+").replace(/_/g, "/"));
    return Uint8Array.from(bin, (c) => c.charCodeAt(0));
  };
  async function enablePush(e) {
    if (e) e.preventDefault();
    if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
      say("This browser cannot show alerts."); return;
    }
    try {
      const perm = await Notification.requestPermission();
      if (perm !== "granted") { say("Alerts are turned off. You can turn them on in your browser settings."); return; }
      const keyData = await (await fetch("/api/push/vapid-public")).json();
      if (!keyData.ok) { say("Alerts are not ready yet. Please try again later."); return; }
      const reg = await navigator.serviceWorker.register("/sw.js");
      await navigator.serviceWorker.ready;
      const sub = await reg.pushManager.subscribe({
        userVisibleOnly: true, applicationServerKey: b64urlToBytes(keyData.key),
      });
      const j = sub.toJSON();
      await fetch("/api/push/subscribe", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ endpoint: j.endpoint, keys: j.keys }),
      });
      say("Urgent alerts are on for this device.");
    } catch { say("Could not turn on alerts. Please try again."); }
  }

  // Home area for local "planning near home" alerts.
  function setHomeArea(e) {
    if (e) e.preventDefault();
    if (!navigator.geolocation) { say("This browser cannot find your location."); return; }
    say("Finding your location…");
    navigator.geolocation.getCurrentPosition(async (pos) => {
      try {
        const data = await (await fetch("/api/me/area", {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        })).json();
        say(data.ok ? "Home area saved. Local planning alerts are on." : "Could not save your home area.");
      } catch { say("Could not save your home area."); }
    }, () => { say("Location is turned off. You can turn it on in your browser settings."); });
  }

  // Anonymous engagement counts (no identifiers); never load-bearing.
  let editionCounted = false;
  function sendEvent(event) {
    try {
      const body = JSON.stringify({ event });
      const ok = navigator.sendBeacon
        && navigator.sendBeacon("/api/event", new Blob([body], { type: "application/json" }));
      if (!ok) fetch("/api/event", { method: "POST", body, keepalive: true, headers: { "content-type": "application/json" } }).catch(() => {});
    } catch { /* telemetry, never load-bearing */ }
  }

  function markRead(item) {
    if (!signedIn) return;
    fetch("/api/read", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ url: item.url, desk: item.desk, title: item.title, state: "read" }),
    }).catch(() => {});
  }

  const ago = (iso) => {
    const mins = Math.max(0, Math.round((Date.now() - Date.parse(iso)) / 60000));
    if (mins < 60) return mins + " min ago";
    const h = Math.round(mins / 60);
    return h < 24 ? h + " hours ago" : Math.round(h / 24) + " days ago";
  };
  const host = (u) => { try { return new URL(u).hostname.replace(/^www\./, ""); } catch { return ""; } };
  const safeUrl = (u) => (/^https?:\/\//i.test(String(u || "")) ? String(u) : "#");

  // One story card (shared by the full feed and the Catch-up edition).
  function renderCard(i) {
    return `
      <li><article class="${i.priority === 3 ? "p3" : ""}"${i.priority === 3 ? ' aria-label="Urgent"' : ""}>
        <p class="meta">
          <span class="desk">${esc(i.desk)}</span>
          ${i.priority === 3 ? '<span class="badge urgent">Urgent</span>' : ""}
          ${i.saga ? '<span class="badge">Ongoing story</span>' : ""}
          <span>${esc(host(i.url))}</span>
          <span>${esc(ago(i.addedAt))}</span>
          ${i.rankWhy ? `<span class="rankwhy" tabindex="0" title="Why you're seeing this: ${esc(i.rankWhy)}" aria-label="Why you're seeing this: ${esc(i.rankWhy)}">★</span>` : ""}
        </p>
        <h2><a href="${esc(safeUrl(i.url))}" target="_blank" rel="noopener noreferrer">${esc(i.title)}</a></h2>
        <p class="summary">${esc(i.summary)}</p>
        ${i.why ? `<p class="why">Why it matters: ${esc(i.why)}</p>` : ""}
        ${held[i.id] ? `<p class="held">Held back from an alert — ${esc(held[i.id])}</p>` : ""}
        ${i.quote ? `<blockquote>“${esc(i.quote)}”</blockquote>` : ""}
      </article></li>`;
  }

  function renderFeed() {
    if (!items.length) {
      $("feed").innerHTML = `<div id="empty"><p class="big">No stories yet</p>
        <p>The newsroom is running. New stories arrive a few times a day — check back soon.</p></div>`;
      return;
    }
    $("feed").innerHTML = `<ol class="feed-list">` + items.map(renderCard).join("") + `</ol>`;
  }

  async function load() {
    try {
      const data = await (await fetch("/api/feed/latest?limit=100")).json();
      items = data.items ?? [];
      currentItems = items;
      const when = new Date().toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
      say(items.length
        ? `${items.length} stories${data.ranked ? ", chosen for you" : ""} · updated ${when}`
        : "No stories yet");
      renderFeed();
      if (!editionCounted && items.length) { editionCounted = true; sendEvent("edition_opened"); }
    } catch {
      say("Cannot load right now. Trying again shortly.");
    }
  }

  // Close the topics panel with the Escape key (keyboard users).
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !$("panel").hidden) closeDesks();
  });

  $("feed").addEventListener("click", (e) => {
    const a = e.target.closest("h2 a");
    if (!a) return;
    const item = currentItems.find((i) => i.url === a.getAttribute("href"));
    if (item) markRead(item);
    sendEvent("linkout_opened");
  });

  whoami();
  load();
  setInterval(load, 5 * 60 * 1000);
})();
</script>
</body>
</html>
