name = "jacks-wire"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Serve the static frontend in ./public; the Worker handles /api/* and the cron.
[assets]
directory = "./public"
binding = "ASSETS"

# Refresh the running feed three times a day (times are UTC). Each run merges
# fresh stories into today's feed rather than replacing it.
#   "0 6 * * *"  = 06:00 UTC (morning, ~07:00 UK summer)
#   "0 12 * * *" = 12:00 UTC (afternoon, ~13:00 UK summer)
#   "0 18 * * *" = 18:00 UTC (evening, ~19:00 UK summer)
[triggers]
crons = ["0 6 * * *", "0 12 * * *", "0 18 * * *"]

# Workers KV stores the generated briefing (one shared copy).
# Namespace "WIRE_KV" was created in the Cloudflare account; its id is below.
[[kv_namespaces]]
binding = "WIRE_KV"
id = "d83154c6f90442f7a287cc1cd8938e80"

# Custom domain. Cloudflare auto-creates the DNS record and provisions TLS for
# this hostname on deploy (the zone databased.business must be in this account).
[[routes]]
pattern = "desk.databased.business"
custom_domain = true

# Optional: override the model. Defaults to claude-sonnet-4-6 in the Worker.
# [vars]
# MODEL = "claude-sonnet-4-6"

# Sign in with Apple (optional). The whole flow is dormant until these are set,
# so the app runs fine without them.
#   1. In the Apple Developer portal create a Services ID (this is APPLE_CLIENT_ID),
#      register the domain desk.databased.business and the return URL
#      https://desk.databased.business/auth/apple/callback
#   2. Set the two vars below, then add the session secret:
#        wrangler secret put SESSION_SECRET   # any long random string
# [vars]
# APPLE_CLIENT_ID = "business.databased.desk"   # your Services ID
# APPLE_REDIRECT_URI = "https://desk.databased.business/auth/apple/callback"
# Paste the contents of Apple's domain-verification file so the Worker serves it
# at /.well-known/apple-developer-domain-association.txt :
# APPLE_DOMAIN_ASSOCIATION = "...file contents..."
