name = "jacks-wire"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Serve the static frontend in ./public; the Worker handles /api/* and the cron.
[assets]
directory = "./public"
binding = "ASSETS"

# Worker cron, three times a day (times are UTC). In routine mode
# (FEED_SOURCE="routine") this does NOT build the shared feed — the routine's
# own schedule owns that cadence. Each run here fires personalised routine
# rebuilds for recently-active signed-in users (see MAX_PERSONALISED_PER_CRON
# below) and, on the morning run, refreshes the onboarding pitches. With
# FEED_SOURCE unset it falls back to building feeds via the metered API.
#   "0 6 * * *"  = 06:00 UTC (morning, ~07:00 UK summer)
#   "0 12 * * *" = 12:00 UTC (afternoon, ~13:00 UK summer)
#   "0 18 * * *" = 18:00 UTC (evening, ~19:00 UK summer)
[triggers]
crons = ["0 6 * * *", "0 12 * * *", "0 18 * * *"]

# Workers KV stores the generated briefing (one shared copy).
# Namespace "WIRE_KV" was created in the Cloudflare account; its id is below.
[[kv_namespaces]]
binding = "WIRE_KV"
id = "d83154c6f90442f7a287cc1cd8938e80"

# R2 bucket for ALL generated media: podcast/ episodes (pre-rendered on ingest,
# keyed by script hash), listen/ per-item read-outs (rendered lazily on first
# play), img/ story thumbnails, beats/ intro/outro stings and previews/ style
# tasters. Lifecycle rules (set in the Cloudflare dashboard, not here) expire
# img/, listen/ and podcast/ after 14 days; beats/ and previews/ are evergreen.
# The ELEVENLABS_API_KEY is an encrypted secret (wrangler secret put — NOT here).
[[r2_buckets]]
binding = "WIRE_AUDIO"
bucket_name = "wire-audio"

# Custom domain. Cloudflare auto-creates the DNS record and provisions TLS for
# this hostname on deploy (the zone databased.business must be in this account).
[[routes]]
pattern = "desk.databased.business"
custom_domain = true

# Sign in with Apple — Services ID + redirect (public, safe to commit so they
# survive `wrangler deploy`). The session secret is set separately as an
# encrypted secret (Dashboard → Worker → Settings → Variables, or
# `wrangler secret put SESSION_SECRET`). Sign-in stays dormant until
# SESSION_SECRET is also present.
# Apple's domain-verification file is served from /.well-known/ when the
# encrypted secret APPLE_DOMAIN_ASSOCIATION holds its contents
# (wrangler secret put APPLE_DOMAIN_ASSOCIATION — NOT here).
[vars]
APPLE_CLIENT_ID = "desk.databased.business"
APPLE_REDIRECT_URI = "https://desk.databased.business/auth/apple/callback"
# MusicKit (radio mode): key id + team id are public-safe (they appear in every
# developer token). The private key is the secret MUSICKIT_PRIVATE_KEY
# (wrangler secret put — NOT here). Radio mode stays dormant until all three exist.
MUSICKIT_KEY_ID = "6KK6CS2PCZ"
APPLE_TEAM_ID = "7BL94Z94QH"
# MODEL = "claude-sonnet-4-6"   # optional model override

# Shared-feed source. Leave unset to generate the shared briefing via the
# Anthropic API on the cron (default). Set to "routine" once the Claude Code
# Routine is pushing the feed to /api/ingest, so the cron steps aside instead
# of overwriting it with a metered build. See routines/SETUP.md.
FEED_SOURCE = "routine"
# Audio kill-switch: pauses the podcast, read-outs, tasters, beats and Wire FM
# (we hit the ElevenLabs usage cap). Set to "false" or delete + deploy to restore.
AUDIO_PAUSED = "true"
#
# /api/ingest stays dormant until the encrypted secret INGEST_SECRET is set
# (wrangler secret put INGEST_SECRET — NOT committed here).

# On-demand "Refresh" for the shared feed. When set, the shared-feed refresh
# fires the routine's own API trigger (subscription-billed) instead of a metered
# Anthropic API build. Get the URL + token from the routine's Edit page →
# "Add another trigger" → API (claude.ai/code/routines). The token is a secret:
#   wrangler secret put ROUTINE_FIRE_TOKEN
# ROUTINE_FIRE_URL = "https://api.anthropic.com/v1/claude_code/routines/<routine_id>/fire"
# NB: prefer `wrangler secret put ROUTINE_FIRE_URL` over a dashboard plain var —
# deploys replace plain vars with this [vars] block, wiping dashboard-only values.
# ROUTINE_FIRE_MIN_SECONDS = "900"   # min seconds between fires per target (protect the daily run cap)
# ROUTINE_FIRE_DAILY_MAX = "15"      # ceiling on ON-DEMAND fires per London day (the cron's scheduled fires bypass it)
# MAX_PERSONALISED_PER_CRON = "8"    # active users whose personalised rebuild each cron run fires via the routine
#
# Cross-day dedup + recency gate (defaults shown; set only to override):
# SEEN_DEDUP = "on"          # "off" disables the rolling per-feed seen-record dedup
# SEEN_WINDOW_DAYS = "6"     # how many days each feed's seen record remembers
# RECENCY_GATE = "on"        # "off" stops dropping confidently-dated stale stories
#
# Story images: GUARDIAN_API_KEY is an encrypted secret (wrangler secret put —
# NOT here). Free developer tier, non-commercial, thumbnails included; used
# only for theguardian.com links. Without it, og:image scraping still runs.
