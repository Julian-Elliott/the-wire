name = "jacks-wire"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Serve the static frontend in ./public; the Worker handles /api/* and the cron.
[assets]
directory = "./public"
binding = "ASSETS"

# Refresh the running feed three times a day (times are UTC). Each run merges
# fresh stories into today's feed rather than replacing it.
#   "0 6 * * *"  = 06:00 UTC (morning, ~07:00 UK summer)
#   "0 12 * * *" = 12:00 UTC (afternoon, ~13:00 UK summer)
#   "0 18 * * *" = 18:00 UTC (evening, ~19:00 UK summer)
[triggers]
crons = ["0 6 * * *", "0 12 * * *", "0 18 * * *"]

# Workers KV stores the generated briefing (one shared copy).
# Namespace "WIRE_KV" was created in the Cloudflare account; its id is below.
[[kv_namespaces]]
binding = "WIRE_KV"
id = "d83154c6f90442f7a287cc1cd8938e80"

# Custom domain. Cloudflare auto-creates the DNS record and provisions TLS for
# this hostname on deploy (the zone databased.business must be in this account).
[[routes]]
pattern = "desk.databased.business"
custom_domain = true

# Sign in with Apple — Services ID + redirect (public, safe to commit so they
# survive `wrangler deploy`). The session secret is set separately as an
# encrypted secret (Dashboard → Worker → Settings → Variables, or
# `wrangler secret put SESSION_SECRET`). Sign-in stays dormant until
# SESSION_SECRET is also present.
[vars]
APPLE_CLIENT_ID = "desk.databased.business"
APPLE_REDIRECT_URI = "https://desk.databased.business/auth/apple/callback"
# MODEL = "claude-sonnet-4-6"   # optional model override

# Shared-feed source. Leave unset to generate the shared briefing via the
# Anthropic API on the cron (default). Set to "routine" once the Claude Code
# Routine is pushing the feed to /api/ingest, so the cron steps aside instead
# of overwriting it with a metered build. See routines/SETUP.md.
FEED_SOURCE = "routine"
#
# /api/ingest stays dormant until the encrypted secret INGEST_SECRET is set
# (wrangler secret put INGEST_SECRET — NOT committed here).
