name: Deploy (Cloudflare Workers)

# Deploys "The Wire" to Cloudflare Workers.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  – a Cloudflare API token with the "Edit Cloudflare Workers"
#                           template permissions (Workers Scripts, Workers KV, Workers Routes).
#   ANTHROPIC_API_KEY     – your Anthropic API key (web search must be enabled for the org).
#
# The ANTHROPIC_API_KEY is pushed to the Worker as an encrypted secret on every deploy,
# so it never lives in the code or in wrangler.toml.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "wrangler.toml"
      - "package.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      # Strip any stray whitespace/newlines that may have been pasted into the
      # secret — wrangler sends the token verbatim as a Bearer header, and a
      # trailing newline produces a malformed-header auth failure (CF code 9106).
      # Also prints the token LENGTH only (never its value) and verifies it
      # against Cloudflare's token-verify endpoint, to distinguish an empty/
      # truncated secret from a permissions/scope problem.
      - name: Normalize & verify Cloudflare API token
        env:
          RAW_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          CLEAN="$(printf '%s' "$RAW_CLOUDFLARE_API_TOKEN" | tr -d '[:space:]')"
          echo "::add-mask::$CLEAN"
          echo "Cleaned token length: ${#CLEAN} characters (a Cloudflare API token is normally 40)."
          if [ -z "$CLEAN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is empty after trimming — the secret holds no usable value. Re-add it."
            exit 1
          fi
          echo "Verifying token against https://api.cloudflare.com/client/v4/user/tokens/verify ..."
          HTTP="$(curl -s -o /tmp/cf_verify.json -w '%{http_code}' \
            https://api.cloudflare.com/client/v4/user/tokens/verify \
            -H "Authorization: Bearer ${CLEAN}")"
          echo "verify HTTP status: ${HTTP}"
          # Body contains the token id + status, never the secret value — safe to surface.
          echo "verify response:"; cat /tmp/cf_verify.json; echo
          if [ "${HTTP}" != "200" ]; then
            echo "::error::Token verification failed (HTTP ${HTTP}). The token value itself is rejected — wrong type (must be an API Token, not a Global API Key), truncated, expired, or revoked."
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN=$CLEAN" >> "$GITHUB_ENV"

      - name: Push ANTHROPIC_API_KEY as a Worker secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: printf '%s' "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY

      - name: Deploy
        run: npx wrangler deploy
