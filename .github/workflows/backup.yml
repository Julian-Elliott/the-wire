# Nightly offsite backups (RUNBOOK §4). Iron rule: personal data never
# enters git and never goes through upload-artifact — everything lands in
# the PRIVATE wire-backups bucket (30-day lifecycle). Runs at 03:50 UTC,
# 20 minutes after the Worker's own DO sweep, and VERIFIES that sweep ran.
name: Nightly backup

on:
  schedule:
    - cron: "50 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: v3/package-lock.json
      - run: npm ci

      - name: Export D1 to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DATE=$(date -u +%F)
          npx wrangler d1 export wire --remote --output=/tmp/d1.sql
          gzip -9 /tmp/d1.sql
          npx wrangler r2 object put "wire-backups/d1/${DATE}.sql.gz" --file=/tmp/d1.sql.gz --remote

      - name: Export KV to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DATE=$(date -u +%F)
          NS="93c06c0cdcd74956867358f89fd17ef8"
          npx wrangler kv key list --namespace-id "$NS" --remote > /tmp/keys.json
          python3 - "$NS" <<'EOF'
          import json, subprocess, sys
          ns = sys.argv[1]
          keys = [k["name"] for k in json.load(open("/tmp/keys.json"))][:500]
          out = {}
          for k in keys:
              try:
                  out[k] = subprocess.run(
                      ["npx", "wrangler", "kv", "key", "get", k, "--namespace-id", ns, "--remote"],
                      capture_output=True, text=True, check=True).stdout
              except subprocess.CalledProcessError:
                  out[k] = None
          json.dump(out, open("/tmp/kv.json", "w"))
          print(f"exported {len(out)} keys")
          EOF
          gzip -9 /tmp/kv.json
          npx wrangler r2 object put "wire-backups/kv/${DATE}.json.gz" --file=/tmp/kv.json.gz --remote

      - name: Verify the Worker's DO sweep ran (last 26h)
        run: |
          swept=$(curl -s -m 20 https://wire.databased.business/api/health | jq -r '.crons["do-sweep"] // empty')
          if [ -z "$swept" ]; then
            echo "::error::DO sweep heartbeat missing — ProfileDO/NewsroomDO dumps may not exist"
            exit 1
          fi
          age=$(( $(date -u +%s) - $(date -u -d "$swept" +%s) ))
          echo "do-sweep age: ${age}s"
          [ "$age" -lt 93600 ] || { echo "::error::DO sweep stale (${age}s)"; exit 1; }

      - name: Dead-man ping (healthchecks.io)
        if: success()
        run: |
          if [ -n "${{ secrets.HC_BACKUP_URL }}" ]; then
            curl -fsS -m 10 --retry 3 "${{ secrets.HC_BACKUP_URL }}" > /dev/null || true
          fi

      - name: Alert on failure
        if: failure()
        run: |
          if [ -n "${{ secrets.NTFY_TOPIC }}" ]; then
            curl -s -m 10 -H "Title: nightly backup FAILED" -H "Priority: high" \
              -d "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} — runbook §4" \
              "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" || true
          fi
